# Legacy Boot 3.x property prefix for Spring Session Redis.
#
# Boot 3.5: spring.session.redis.* is the canonical prefix. RedisSessionProperties
#           binds and the configured namespace flows through to the session repository.
#
# Boot 4.0: this prefix has been renamed to spring.session.data.redis.* and the
#           configuration class itself was renamed and moved to a new jar
#           (spring-boot-session-data-redis). The legacy prefix is silently ignored.
#
# Distinct prod-looking namespace so we can detect whether the property was honored.
spring.session.store-type=redis
spring.session.redis.namespace=spring-break:custom-namespace

# Embedded fake Redis would normally be needed; this test only inspects the bound
# properties bean, not actual Redis connections. spring.data.redis.host points to
# a non-routable address to make any accidental connection attempt fail quickly.
spring.data.redis.host=127.0.0.255
spring.data.redis.port=63999
spring.data.redis.timeout=100ms
