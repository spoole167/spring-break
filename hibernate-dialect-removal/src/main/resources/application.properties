spring.application.name=hibernate-dialect-removal

# Database configuration — H2 in-memory for testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate configuration — using auto-detection (NOT an explicit dialect)
# This ensures the CRUD tests work on both Boot 3.x and 4.0.
#
# The BREAKING CHANGE is when teams set an explicit version-specific dialect:
#   spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
#   spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQL10Dialect
#   spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDB106Dialect
#
# These version-specific dialect classes are REMOVED in Hibernate 7.0 (Boot 4.0).
# Hibernate 7.0 auto-detects the database version using JDBC metadata.
# The test class verifies this via reflection.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
