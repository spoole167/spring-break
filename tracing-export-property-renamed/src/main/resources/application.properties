# Legacy Boot 3.x property to disable tracing.
#
# Boot 3.5: this property is read by @ConditionalOnEnabledTracing.
#           Setting it to false means the BraveAutoConfiguration condition fails,
#           Brave's Tracing bean is NOT created, tracing is genuinely disabled.
#
# Boot 4.0: this property has been renamed to management.tracing.export.enabled.
#           The legacy name is silently ignored. The new property defaults to true,
#           so Brave's Tracing bean IS created — tracing is silently re-enabled
#           despite the user's explicit intent to disable it.
#
# This is the silent regression the test demonstrates.
management.tracing.enabled=false
