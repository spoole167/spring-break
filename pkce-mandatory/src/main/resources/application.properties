# OAuth2 Client Configuration - Spring Boot 3.4.1
# This configuration does NOT explicitly specify PKCE parameters.
#
# On Spring Security 6.x: PKCE is only used for public clients (no client_secret)
# On Spring Security 7.x: PKCE is automatically enabled for all clients
#
# This is a demonstration configuration. In production, use your actual provider details.

# Application name and server port
spring.application.name=pkce-demo
server.port=8080

# OAuth2 Client Registration
# Standard authorization_code flow without explicit PKCE configuration
spring.security.oauth2.client.registration.example-provider.client-id=your-client-id
spring.security.oauth2.client.registration.example-provider.client-secret=your-client-secret
spring.security.oauth2.client.registration.example-provider.client-name=Example OAuth Provider
spring.security.oauth2.client.registration.example-provider.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.example-provider.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.example-provider.scope=openid,profile,email

# OAuth2 Provider Configuration
spring.security.oauth2.client.provider.example-provider.authorization-uri=https://provider.example.com/oauth/authorize
spring.security.oauth2.client.provider.example-provider.token-uri=https://provider.example.com/oauth/token
spring.security.oauth2.client.provider.example-provider.user-info-uri=https://provider.example.com/user
spring.security.oauth2.client.provider.example-provider.user-name-attribute=sub

# Logging configuration for debugging PKCE behavior
logging.level.org.springframework.security.oauth2=DEBUG
logging.level.org.springframework.security.web=DEBUG
