# Legacy Boot 3.x property prefix.
#
# Boot 3.5: spring.data.mongodb.* is the canonical prefix. MongoProperties binds
#           and the configured host/database flow through to the MongoClient.
#
# Boot 4.0: this prefix has been renamed to spring.mongodb.*. The legacy form is
#           silently ignored — MongoProperties on 4.0 reads spring.mongodb.* only.
#           The application starts, MongoTemplate is wired, but the URI defaults
#           to localhost:27017/test (Boot's own default), not the configured host.
#
# This is the silent regression the test demonstrates. The host below is a
# nonsensical value chosen so we can detect whether the property is actually being read.
spring.data.mongodb.uri=mongodb://nonexistent-host.test:27017/configured-db
