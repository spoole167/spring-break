spring.application.name=oauth-password-grant-removed

# OAuth 2.0 Client Configuration
# This configuration uses the Password Grant (Resource Owner Password Credentials)
# which is REMOVED in Spring Security 6.1+ and Spring Boot 4.0

spring.security.oauth2.client.registration.example.client-id=my-client-id
spring.security.oauth2.client.registration.example.client-secret=my-client-secret

# WARNING: This grant type no longer works in Spring Boot 4.0!
# authorization-grant-type=password is no longer supported
spring.security.oauth2.client.registration.example.authorization-grant-type=password

spring.security.oauth2.client.registration.example.scope=read,write
spring.security.oauth2.client.provider.example.token-uri=https://example.com/oauth/token
spring.security.oauth2.client.provider.example.authorization-uri=https://example.com/oauth/authorize
spring.security.oauth2.client.provider.example.user-info-uri=https://example.com/user
spring.security.oauth2.client.provider.example.user-name-attribute=name
