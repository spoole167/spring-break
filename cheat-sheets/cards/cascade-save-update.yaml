id: cascade-save-update
tier: 2
tier_label: "Won't Run"
title: "CascadeType.SAVE_UPDATE Removed in Hibernate 7"
series: "spring-boot 3.5 → 4.0"
effort: M
openrewrite: true
verify: >
  mvn compile — no CascadeType.SAVE_UPDATE errors

further_info: >
  Driven by Hibernate 7.0 (upstream of Spring Boot 4.0 via
  spring-boot-starter-data-jpa). Session.saveOrUpdate() and
  CascadeType.SAVE_UPDATE were deprecated in Hibernate 6.0 and removed in
  7.0 as part of the alignment with the JPA EntityManager API. See also:
  session-delete-removed, hibernate-dialect-removal.

oneliner: >
  Hibernate 7 removed the proprietary CascadeType.SAVE_UPDATE. Entities
  using this cascade type fail at startup or throw MappingException when
  the SessionFactory is built.

error_output: |
  org.springframework.beans.factory.BeanCreationException:
    Error creating bean with name 'entityManagerFactory'
  ...
  Caused by: org.hibernate.MappingException:
    Unrecognized legacy cascade style: save-update
   at org.hibernate.boot.model.internal.EntityBinder.bindEntityAnnotation(...)
   at org.hibernate.boot.model.internal.AnnotationBinder.bindClass(...)
   ...
  APPLICATION FAILED TO START
  ---
  Description:
  Failed to initialize JPA EntityManagerFactory:
  Unrecognized legacy cascade style: save-update

what_changed: >
  <code>org.hibernate.annotations.CascadeType.SAVE_UPDATE</code> was a
  Hibernate-specific extension to JPA cascade types. It triggered cascade
  behaviour on Hibernate's proprietary <code>Session.saveOrUpdate()</code>
  method. Hibernate 7 removed both <code>saveOrUpdate()</code> and the
  corresponding cascade type. Code using the Hibernate-specific
  <code>@Cascade</code> annotation with <code>SAVE_UPDATE</code> breaks
  at entity mapping time.

why_changed: >
  The <code>saveOrUpdate()</code> method was deprecated in Hibernate 6
  as part of aligning with the JPA <code>EntityManager</code> API.
  Hibernate 7 completed the removal. The standard JPA
  <code>CascadeType.PERSIST</code> and <code>CascadeType.MERGE</code>
  cover the same use cases without vendor lock-in.

diffs:
  - comment: "// Using Hibernate @Cascade annotation"
    removed: |
      import org.hibernate.annotations.Cascade;
      import org.hibernate.annotations.CascadeType;

      @OneToMany(mappedBy = "order")
      @Cascade(CascadeType.SAVE_UPDATE)
      private List<OrderItem> items;
    added: |
      @OneToMany(mappedBy = "order", cascade = {
          javax.persistence.CascadeType.PERSIST,
          javax.persistence.CascadeType.MERGE
      })
      private List<OrderItem> items;
  - comment: "// Using JPA cascade with Hibernate extras"
    removed: |
      @OneToMany(mappedBy = "parent")
      @Cascade({CascadeType.SAVE_UPDATE, CascadeType.DELETE})
      private Set<Child> children;
    added: |
      @OneToMany(mappedBy = "parent", cascade = {
          CascadeType.PERSIST, CascadeType.MERGE, CascadeType.REMOVE
      })
      private Set<Child> children;

fixes:
  - label: "Replace with JPA standard cascades."
    text: >
      Swap <code>CascadeType.SAVE_UPDATE</code> for the combination of
      <code>CascadeType.PERSIST</code> and <code>CascadeType.MERGE</code>.
      These two JPA-standard cascades cover the same persist-or-update
      behaviour that <code>SAVE_UPDATE</code> provided.
  - label: "Remove @Cascade if redundant."
    text: >
      If your entity already has <code>cascade = CascadeType.ALL</code>
      on the JPA annotation, the Hibernate <code>@Cascade</code> is
      redundant. Delete it entirely.

scope_check: >
  Search for <code>CascadeType.SAVE_UPDATE</code> and
  <code>@Cascade</code> (the Hibernate annotation, not JPA). Every hit
  is a mapping that will fail at startup. Also search for
  <code>session.saveOrUpdate(</code> — that method is gone too.

watch_out:
  - >
    <code>CascadeType.PERSIST</code> alone does not cover the "update
    existing detached entity" case. You need both <code>PERSIST</code>
    and <code>MERGE</code> to match the old <code>SAVE_UPDATE</code>
    behaviour.
  - >
    If you were using <code>Session.saveOrUpdate()</code> directly in
    DAO code, that method is also removed. Replace with
    <code>entityManager.merge()</code> or <code>entityManager.persist()</code>.
  - >
    Some code generators and legacy mapping tools emit
    <code>SAVE_UPDATE</code> by default. Re-run generation after upgrading.

