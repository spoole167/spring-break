id: spring-security-access-relocated
tier: 1
tier_label: "Won't Build"
title: "Spring Security Access API Moved to spring-security-access"
series: "spring-boot 3.5 → 4.0"
effort: M
openrewrite: false
verify: >
  mvn compile — no cannot find symbol for AccessDecisionManager or related classes

further_info: >
  Spring Security 7.0 moved the legacy Access API out of spring-security-core
  into a separate spring-security-access module. This was done to allow teams
  to continue using the legacy API during migration without it polluting the
  core module. The modern replacement is AuthorizationManager.

oneliner: >
  AccessDecisionManager and related legacy authorisation classes moved to
  a separate spring-security-access module. Add it or migrate to AuthorizationManager.

error_output: |
  $ mvn compile
  [ERROR] /src/main/java/com/example/AccessApiUsage.java:[3,48]
    error: package org.springframework.security.access does not exist

what_changed: >
  <code>AccessDecisionManager</code>, <code>AccessDecisionVoter</code>,
  <code>@EnableGlobalMethodSecurity</code>, and related legacy authorisation
  classes have been moved from <code>spring-security-core</code> to a new
  standalone <code>spring-security-access</code> artifact.

why_changed: >
  Spring Security 7.0 promotes the modern <code>AuthorizationManager</code>
  API as the sole supported approach. The legacy Access API is preserved for
  migration purposes but isolated into its own module so teams that have
  completed migration do not carry the dead weight.

diffs:
  - comment: "// pom.xml — add legacy module if needed"
    added: |
      <dependency>
          <groupId>org.springframework.security</groupId>
          <artifactId>spring-security-access</artifactId>
      </dependency>
  - comment: "// Preferred: migrate to AuthorizationManager"
    removed: |
      import org.springframework.security.access.AccessDecisionManager;
      // implements AccessDecisionManager
    added: |
      import org.springframework.security.authorization.AuthorizationManager;
      // implements AuthorizationManager<RequestAuthorizationContext>

fixes:
  - label: "Add spring-security-access (short-term fix)."
    text: >
      Add <code>spring-security-access</code> as an explicit dependency.
      This restores compilation without any logic changes and buys time
      to do the full migration.
  - label: "Migrate to AuthorizationManager (recommended)."
    text: >
      Replace <code>AccessDecisionManager</code> / <code>AccessDecisionVoter</code>
      implementations with <code>AuthorizationManager</code>. Replace
      <code>@EnableGlobalMethodSecurity</code> with
      <code>@EnableMethodSecurity</code>. The Spring Security migration guide
      has step-by-step instructions.

scope_check: >
  Search for <code>AccessDecisionManager</code>, <code>AccessDecisionVoter</code>,
  <code>@EnableGlobalMethodSecurity</code>, and
  <code>org.springframework.security.access</code> imports across all sources.

watch_out:
  - >
    <code>@EnableGlobalMethodSecurity</code> is also in the legacy module.
    If you use method security, you need either the legacy module or to migrate
    to <code>@EnableMethodSecurity</code> before removing it.

footer_links:
