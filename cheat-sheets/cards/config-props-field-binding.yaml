id: config-props-field-binding
tier: 1
tier_label: "Won't Build"
title: "@ConfigurationProperties Field Binding Removed"
series: "spring-boot 3.5 → 4.0"
effort: M
openrewrite: false
verify: >
  Config props bind correctly — no BindException on startup

further_info: >
  Introduced in Spring Boot 4.0. Field binding was never officially
  recommended but was silently supported since Boot 1.x. Constructor binding
  (added in Boot 2.2, improved in 3.0) and Java records are the preferred
  alternatives. Affects all spring-boot-starter consumers that use
  @ConfigurationProperties.

oneliner: >
  Spring Boot 4.0 no longer binds @ConfigurationProperties to public fields.
  Only JavaBean setters or constructor binding work now.

error_output: |
  $ mvn spring-boot:run
  ***************************
  APPLICATION FAILED TO START
  ***************************
  Description:
  Failed to bind properties under 'app.mail' to com.example.config.MailProperties:

      Property: app.mail.host
      Value: "smtp.example.com"
      Reason: No setter found for property 'host' on class
              com.example.config.MailProperties. Public field binding
              is no longer supported. Add a setter method or use
              constructor binding.

what_changed: >
  Spring Boot 4.0 removed support for binding
  <code>@ConfigurationProperties</code> values to public fields. The
  property binding mechanism now requires either JavaBean-style setter
  methods or constructor binding (via <code>@ConstructorBinding</code>
  or a single constructor). Classes that relied on direct public field
  access fail at startup.

why_changed: >
  Public field binding bypassed validation, made immutability impossible,
  and broke encapsulation. Setter-based and constructor-based binding
  both support <code>@Validated</code> constraints and are consistent
  with the rest of Spring's binding model.

diffs:
  - comment: "// ConfigurationProperties class — field binding (broken)"
    removed: |
      @ConfigurationProperties(prefix = "app.mail")
      public class MailProperties {
          public String host;
          public int port;
          public boolean ssl;
      }
    added: |
      @ConfigurationProperties(prefix = "app.mail")
      public class MailProperties {
          private String host;
          private int port;
          private boolean ssl;

          public String getHost() { return host; }
          public void setHost(String host) { this.host = host; }
          public int getPort() { return port; }
          public void setPort(int port) { this.port = port; }
          public boolean isSsl() { return ssl; }
          public void setSsl(boolean ssl) { this.ssl = ssl; }
      }
  - comment: "// Or use constructor binding (immutable, recommended)"
    removed: |
      @ConfigurationProperties(prefix = "app.mail")
      public class MailProperties {
          public String host;
          public int port;
          public boolean ssl;
      }
    added: |
      @ConfigurationProperties(prefix = "app.mail")
      public record MailProperties(String host, int port, boolean ssl) {
      }

fixes:
  - label: "Add getter/setter methods."
    text: >
      Convert public fields to private fields with standard JavaBean
      getter and setter methods. Your IDE can generate these automatically.
  - label: "Use a Java record (recommended)."
    text: >
      Convert the class to a <code>record</code>. Records use constructor
      binding automatically and are immutable by design. This is the
      cleanest option for configuration properties.
  - label: "Use Lombok @Data."
    text: >
      If you prefer fewer boilerplate lines, annotate the class with
      <code>@Data</code> or <code>@Getter @Setter</code> from Lombok.

scope_check: >
  Search for <code>@ConfigurationProperties</code> classes and check if
  any have public fields without setters. Look for the pattern
  <code>public String</code>, <code>public int</code>, etc. in those
  classes.

watch_out:
  - >
    This is a startup failure, not a compile error. Your code will compile
    fine — it fails when Spring Boot tries to bind properties at runtime.
    If you have good test coverage with <code>@SpringBootTest</code>,
    you'll catch it in tests. Otherwise it hits production.
  - >
    If you switch to records, remember that records are immutable. Code
    that previously mutated the properties object after injection will
    break. That code was probably wrong anyway, but review it.

