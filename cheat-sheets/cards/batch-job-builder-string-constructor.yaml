id: batch-job-builder-string-constructor
tier: 1
tier_label: "Won't Build"
title: "Spring Batch JobBuilder(String) Constructor Removed"
series: "spring-boot 3.5 → 4.0"
effort: S
openrewrite: false
verify: >
  mvn compile — no cannot find symbol for JobBuilder(String) constructor

further_info: >
  Spring Batch 6.0 enforces that a JobRepository is always provided at
  construction time. The same change applies to StepBuilder and other
  builder classes. The JobRepository is no longer optional or deferrable —
  it must be injected and passed in when the builder is created.

oneliner: >
  JobBuilder(String) is removed. JobRepository is now mandatory at
  construction: new JobBuilder("name", jobRepository).

error_output: |
  $ mvn compile
  [ERROR] /src/main/java/com/example/JobBuilderUsage.java:[9,33]
    error: no suitable constructor found for JobBuilder(java.lang.String)

what_changed: >
  <code>new JobBuilder(String name)</code> and the subsequent
  <code>.repository(JobRepository)</code> method have been removed.
  <code>JobRepository</code> is now mandatory at construction time:
  <code>new JobBuilder(String name, JobRepository repository)</code>.
  The same applies to <code>StepBuilder</code> and other builder classes.

why_changed: >
  Spring Batch 6.0 made <code>JobRepository</code> non-optional throughout
  the framework to ensure jobs are always backed by a persistent or in-memory
  store. Deferring the repository assignment was a source of subtle bugs
  where jobs ran without persistence.

diffs:
  - comment: "// Before — repository set after construction"
    removed: |
      new JobBuilder("myJob")
          .repository(jobRepository)
          .start(step)
          .build();
  - comment: "// After — repository required at construction"
    added: |
      new JobBuilder("myJob", jobRepository)
          .start(step)
          .build();
  - comment: "// @Bean method pattern"
    removed: |
      @Bean
      public Job myJob(Step step) {
          return new JobBuilder("myJob").start(step).build();
      }
    added: |
      @Bean
      public Job myJob(JobRepository jobRepository, Step step) {
          return new JobBuilder("myJob", jobRepository).start(step).build();
      }

fixes:
  - label: "Inject JobRepository and pass it to the constructor."
    text: >
      Add <code>JobRepository</code> as a parameter to your
      <code>@Bean</code> method (Spring will inject it) and pass it
      as the second argument to <code>new JobBuilder(...)</code>.
      The same change is needed for <code>StepBuilder</code> and
      any other builder that previously accepted only a name.

scope_check: >
  Search for <code>new JobBuilder(</code>, <code>new StepBuilder(</code>,
  and <code>.repository(</code> across all <code>@Configuration</code>
  classes that define Batch jobs and steps.

watch_out:
  - >
    The <code>.repository()</code> method is also gone. If you try to add
    the repository via the fluent chain rather than the constructor, it
    won't compile either. Pass it in the constructor — there is no fallback.

