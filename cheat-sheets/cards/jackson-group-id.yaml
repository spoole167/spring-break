id: jackson-group-id
tier: 1
tier_label: "Won't Build"
title: "Jackson 3.0 Group ID Change"
series: "spring-boot 3.5 → 4.0"
effort: L
openrewrite: true
verify: >
  mvn compile succeeds with no com.fasterxml errors

further_info: >
  Driven by Jackson 3.0 (upstream of Spring Boot 4.0). The FasterXML to
  tools.jackson rename was announced in 2023 and finalised in Jackson
  3.0-rc1. Affects all spring-boot-starter-json consumers. See also:
  jackson-class-renames, jackson-exception-hierarchy.

oneliner: >
  Jackson 3.0 moved from com.fasterxml.jackson to tools.jackson.
  Every Maven coordinate and every import path is now wrong.

error_output: |
  $ mvn compile
  [ERROR] /src/main/java/com/example/JacksonConfig.java:[3,32]
    package com.fasterxml.jackson.databind does not exist
  [ERROR] /src/main/java/com/example/JacksonConfig.java:[8,5]
    cannot find symbol
      symbol: class ObjectMapper

what_changed: >
  Jackson 3.0 moved from the <code>com.fasterxml.jackson</code> Maven
  group to <code>tools.jackson</code>. Spring Boot 4.0's managed
  dependencies point to Jackson 3.0, so the old group ID no longer
  resolves. Every import statement using <code>com.fasterxml.jackson</code>
  breaks. See also: jackson-class-renames (for the class-level renames
  that come with the same upgrade), jackson-exception-hierarchy.

why_changed: >
  Jackson's maintainers separated the project identity from the original
  FasterXML organisation, giving a clean break to drop deprecated APIs
  and ship Jackson 3.0 as a proper major release.

diffs:
  - comment: "// pom.xml — explicit Jackson dependency"
    removed: |
      <dependency>
          <groupId>com.fasterxml.jackson.core</groupId>
          <artifactId>jackson-databind</artifactId>
      </dependency>
    added: |
      <dependency>
          <groupId>tools.jackson.core</groupId>
          <artifactId>jackson-databind</artifactId>
      </dependency>
  - comment: "// Java imports — ObjectMapper and core types"
    removed: |
      import com.fasterxml.jackson.databind.ObjectMapper;
      import com.fasterxml.jackson.core.JsonProcessingException;
    added: |
      import tools.jackson.databind.ObjectMapper;
      import tools.jackson.core.JacksonException;

fixes:
  - label: "OpenRewrite (recommended)."
    text: >
      Run the <a href="https://docs.openrewrite.org/recipes/java/jackson/upgradejackson_2_3_typechanges">Jackson 3 migration recipe</a>.
      Handles group ID changes and import updates across the entire
      codebase in one pass.
  - label: "Manual: update Maven coordinates first."
    text: >
      Replace <code>com.fasterxml.jackson</code> with
      <code>tools.jackson</code> in all POM or Gradle files. Then fix
      imports file by file. Note that the group ID fix alone is not
      enough — class names also changed. See: jackson-class-renames.

scope_check: >
  Search your codebase for <code>com.fasterxml.jackson</code>. Every
  hit is a coordinate or import that needs updating. If you use
  <code>spring-boot-starter-json</code> or
  <code>spring-boot-starter-web</code>, Jackson is already on your
  classpath transitively — you still need to update any explicit
  dependency declarations and all source-level imports.

watch_out:
  - >
    The group ID change and the class renames (JsonSerializer →
    ValueSerializer, SerializerProvider → SerializationContext) happen
    in the same Jackson 3.0 upgrade. Fixing only the group ID leaves
    broken class references. See jackson-class-renames for the full
    list of renamed types.
  - >
    Jackson exceptions (<code>JsonMappingException</code>,
    <code>JsonProcessingException</code>) are <code>Serializable</code>.
    If you've persisted these anywhere (dead letter queues, error logs),
    those serialised streams contain the old class names and won't
    deserialise correctly after migration.

footer_links:
  - text: "spring-break module: jackson-group-id"
    url: "https://github.com/spoole167/spring-break/tree/main/jackson-group-id"
  - text: "Jackson 3 migration guide"
    url: "https://github.com/FasterXML/jackson/blob/main/jackson3/MIGRATING_TO_JACKSON_3.md"
