id: httpheaders-multivaluemap
tier: 1
tier_label: "Won't Build"
title: "HttpHeaders No Longer Implements MultiValueMap"
series: "spring-boot 3.5 → 4.0"
effort: M
openrewrite: false
verify: >
  mvn compile — no incompatible types or cannot find symbol errors on HttpHeaders usage

further_info: >
  Driven by Spring Framework 7.0. HttpHeaders was a subtype of
  MultiValueMap since early in Spring's history. The break affects any
  code that relies on that structural relationship: method parameters
  typed as MultiValueMap that receive HttpHeaders, or direct calls to
  Map methods like containsKey(), keySet(), entrySet() on an HttpHeaders
  reference.

oneliner: >
  HttpHeaders no longer implements MultiValueMap. Code that treats
  headers as a general-purpose map fails to compile.

error_output: |
  $ mvn compile
  [ERROR] /src/main/java/com/example/HttpHeadersUsage.java:[8,24]
    error: incompatible types: HttpHeaders cannot be converted to MultiValueMap
  [ERROR] /src/main/java/com/example/HttpHeadersUsage.java:[12,16]
    error: cannot find symbol
      symbol: method containsKey(String)

what_changed: >
  <code>HttpHeaders</code> no longer implements
  <code>MultiValueMap&lt;String, String&gt;</code> or
  <code>Map&lt;String, List&lt;String&gt;&gt;</code>.
  Map-style methods like <code>containsKey()</code>, <code>keySet()</code>,
  and <code>entrySet()</code> are gone from the type. Header-specific
  methods replace them.

why_changed: >
  Treating HTTP headers as a generic map encouraged misuse and prevented
  performance optimisations in the header handling implementation. The
  dedicated <code>HttpHeaders</code> API is more expressive and allows
  the backing store to be optimised independently of the Map contract.

diffs:
  - comment: "// Replace Map method calls with HttpHeaders equivalents"
    removed: "headers.containsKey(\"Content-Type\")"
    added: "headers.containsHeader(\"Content-Type\")"
  - removed: "Set<String> names = headers.keySet();"
    added: "Set<String> names = headers.headerNames();"
  - removed: "Set<Map.Entry<String, List<String>>> entries = headers.entrySet();"
    added: "Set<Map.Entry<String, List<String>>> entries = headers.headerSet();"
  - comment: "// Passing HttpHeaders where MultiValueMap is expected"
    removed: "void process(MultiValueMap<String, String> map) { ... }\nprocess(headers);"
    added: "void process(HttpHeaders headers) { ... }\n// or, if the method signature can't change:\nprocess(headers.toMultiValueMap());"

fixes:
  - label: "Replace Map methods with HttpHeaders methods."
    text: >
      <code>containsKey(k)</code> → <code>containsHeader(k)</code>,
      <code>keySet()</code> → <code>headerNames()</code>,
      <code>entrySet()</code> → <code>headerSet()</code>.
      These replacements compile on both 3.5 and 4.0.
  - label: "For method signatures that accept MultiValueMap."
    text: >
      If you have a utility method that accepts
      <code>MultiValueMap&lt;String, String&gt;</code> and you pass
      <code>HttpHeaders</code> into it, either change the parameter type to
      <code>HttpHeaders</code>, or call
      <code>headers.toMultiValueMap()</code> at the call site.

scope_check: >
  Search for <code>MultiValueMap</code> usages near <code>HttpHeaders</code>
  across your codebase. Also search for
  <code>.containsKey(</code>, <code>.keySet()</code>, <code>.entrySet()</code>
  called on variables of type <code>HttpHeaders</code>.

watch_out:
  - >
    Code in Spring interceptors, filters, and custom converters that inspects
    headers using Map idioms is the most common source of these failures.
    Check <code>HandlerInterceptor</code>, <code>ClientHttpRequestInterceptor</code>,
    and <code>ResponseBodyAdvice</code> implementations.
  - >
    <code>toMultiValueMap()</code> returns a copy, not a live view. Mutations
    to the returned map do not affect the original <code>HttpHeaders</code>.

