id: listenable-future-removed
tier: 1
tier_label: "Won't Build"
title: "ListenableFuture Removed"
series: "spring-boot 3.5 → 4.0"
effort: M
openrewrite: false
verify: >
  mvn compile — no ListenableFuture symbol errors

further_info: >
  ListenableFuture was deprecated in Spring Framework 6.0 and removed in 7.0
  (tracked in spring-framework#33808). CompletableFuture has been the
  recommended alternative since Java 8. Also affects Spring Kafka and Spring
  AMQP return types that previously used ListenableFuture.

oneliner: >
  Spring Framework removed ListenableFuture entirely.
  All async code using it must switch to CompletableFuture.

error_output: |
  $ mvn compile
  [ERROR] /src/main/java/com/example/service/AsyncService.java:[4,49]
    error: cannot find symbol
      symbol:   class ListenableFuture
      location: package org.springframework.util.concurrent
  [ERROR] /src/main/java/com/example/service/AsyncService.java:[5,49]
    error: cannot find symbol
      symbol:   class ListenableFutureCallback
      location: package org.springframework.util.concurrent

what_changed: >
  <code>ListenableFuture</code>, <code>ListenableFutureCallback</code>,
  <code>ListenableFutureTask</code>, and related classes in
  <code>org.springframework.util.concurrent</code> were deleted from
  Spring Framework 7.0. All Spring APIs that previously returned
  <code>ListenableFuture</code> now return
  <code>java.util.concurrent.CompletableFuture</code>.

why_changed: >
  <code>ListenableFuture</code> predated Java 8. Once
  <code>CompletableFuture</code> arrived in the JDK, maintaining a
  parallel abstraction added complexity with no benefit. The migration
  was staged over several releases with deprecation warnings.

diffs:
  - comment: "// Async method return type"
    removed: |
      import org.springframework.util.concurrent.ListenableFuture;

      @Async
      public ListenableFuture<String> fetchData() {
          return AsyncResult.forValue(doWork());
      }
    added: |
      import java.util.concurrent.CompletableFuture;

      @Async
      public CompletableFuture<String> fetchData() {
          return CompletableFuture.completedFuture(doWork());
      }
  - comment: "// Callback-based usage"
    removed: |
      ListenableFuture<String> future = asyncService.fetchData();
      future.addCallback(
          result -> log.info("Success: {}", result),
          ex -> log.error("Failed", ex)
      );
    added: |
      CompletableFuture<String> future = asyncService.fetchData();
      future.whenComplete((result, ex) -> {
          if (ex != null) log.error("Failed", ex);
          else log.info("Success: {}", result);
      });

fixes:
  - label: "Replace with CompletableFuture."
    text: >
      Change return types from <code>ListenableFuture&lt;T&gt;</code> to
      <code>CompletableFuture&lt;T&gt;</code>. Replace
      <code>AsyncResult.forValue()</code> with
      <code>CompletableFuture.completedFuture()</code>. Replace
      <code>addCallback()</code> with <code>whenComplete()</code> or
      <code>thenAccept()</code>.
  - label: "Use OpenRewrite."
    text: >
      The <code>org.openrewrite.java.spring.framework.MigrateSpringAssert</code>
      recipe set includes <code>ListenableFuture</code> migration.

scope_check: >
  Search for <code>ListenableFuture</code>, <code>ListenableFutureCallback</code>,
  and <code>AsyncResult</code>. Also check for <code>addCallback(</code>
  calls — these are the usage sites that need rewriting even if the
  declaration is in a library.

watch_out:
  - >
    <code>AsyncResult</code> was also removed. If you used
    <code>new AsyncResult&lt;&gt;(value)</code> or
    <code>AsyncResult.forValue()</code>, both must change to
    <code>CompletableFuture.completedFuture()</code>.
  - >
    If you used <code>ListenableFuture</code> in a messaging listener
    (e.g., Spring Kafka's <code>KafkaTemplate.send()</code>), the
    return type changed upstream too. Check your Kafka and AMQP
    send-and-confirm patterns.

footer_links:
  - text: "Spring-Break Demo"
    url: "https://github.com/spoole167/spring-break/tree/main/listenable-future-removed"
