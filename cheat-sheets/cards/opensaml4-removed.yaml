id: opensaml4-removed
tier: 2
tier_label: "Won't Run"
title: "OpenSAML 4 Support Removed"
series: "spring-boot 3.5 → 4.0"
effort: L
openrewrite: false
verify: >
  SAML login flow completes with OpenSAML 5 libraries

further_info: >
  Driven by Spring Security 7.0. OpenSAML 4 reached end of life; OpenSAML 5
  is now required. The OpenSaml4AuthenticationProvider was replaced by
  OpenSaml5AuthenticationProvider. Affects spring-boot-starter-security
  consumers using SAML 2.0 login (saml2Login()). The Shibboleth Maven
  repository is still required for OpenSAML artifacts.

oneliner: >
  Spring Security 7 dropped OpenSAML 4 support and requires OpenSAML 5.
  Applications using SAML 2.0 login fail at startup with
  ClassNotFoundException for OpenSAML 4 classes.

error_output: |
  org.springframework.beans.factory.BeanCreationException:
    Error creating bean with name 'securityFilterChain'
  ...
  Caused by: java.lang.NoClassDefFoundError:
    org/opensaml/saml/saml2/core/impl/AuthnRequestMarshaller
   at org.springframework.security.saml2.provider.service.registration
    .OpenSamlRelyingPartyRegistrationBuilderFactory.<clinit>(...)
  Caused by: java.lang.ClassNotFoundException:
    org.opensaml.saml.saml2.core.impl.AuthnRequestMarshaller
   at java.base/jdk.internal.loader.BuiltinClassLoader.loadClass(...)
  ---
  APPLICATION FAILED TO START

what_changed: >
  Spring Security 7 removed all OpenSAML 4 compatibility classes and now
  requires OpenSAML 5 exclusively. The internal SAML support classes
  (<code>OpenSaml4AuthenticationProvider</code>,
  <code>OpenSaml4AuthenticationRequestResolver</code>, etc.) were replaced
  with OpenSAML 5 equivalents. OpenSAML 5 changed package structures and
  removed the marshaller/unmarshaller split.

why_changed: >
  OpenSAML 4 reached end of life. OpenSAML 5 brought significant API
  improvements, including a simplified object-provider model and better
  XML security defaults. Maintaining dual support across two major
  OpenSAML versions was unsustainable.

diffs:
  - comment: "// Maven dependency"
    removed: |
      <dependency>
          <groupId>org.opensaml</groupId>
          <artifactId>opensaml-saml-api</artifactId>
          <version>4.3.2</version>
      </dependency>
      <dependency>
          <groupId>org.opensaml</groupId>
          <artifactId>opensaml-saml-impl</artifactId>
          <version>4.3.2</version>
      </dependency>
    added: |
      <dependency>
          <groupId>org.opensaml</groupId>
          <artifactId>opensaml-saml-api</artifactId>
          <version>5.1.2</version>
      </dependency>
      <dependency>
          <groupId>org.opensaml</groupId>
          <artifactId>opensaml-saml-impl</artifactId>
          <version>5.1.2</version>
      </dependency>
  - comment: "// Java config — authentication provider"
    removed: |
      import org.springframework.security.saml2.provider.service.authentication
          .OpenSaml4AuthenticationProvider;

      OpenSaml4AuthenticationProvider provider =
          new OpenSaml4AuthenticationProvider();
    added: |
      import org.springframework.security.saml2.provider.service.authentication
          .OpenSaml5AuthenticationProvider;

      OpenSaml5AuthenticationProvider provider =
          new OpenSaml5AuthenticationProvider();
  - comment: "// Java config — custom response validator"
    removed: |
      OpenSaml4AuthenticationProvider provider =
          new OpenSaml4AuthenticationProvider();
      provider.setResponseValidator(responseToken -> {
          Saml2ResponseValidatorResult result =
              OpenSaml4AuthenticationProvider
                  .createDefaultResponseValidator()
                  .convert(responseToken);
    added: |
      OpenSaml5AuthenticationProvider provider =
          new OpenSaml5AuthenticationProvider();
      provider.setResponseValidator(responseToken -> {
          Saml2ResponseValidatorResult result =
              OpenSaml5AuthenticationProvider
                  .createDefaultResponseValidator()
                  .convert(responseToken);

fixes:
  - label: "Upgrade OpenSAML dependencies to 5.x."
    text: >
      Update your OpenSAML dependencies to version 5.1.x. If you use
      Spring Boot's dependency management, the managed version will
      already be OpenSAML 5 in Spring Boot 4.0. Remove any explicit
      version overrides pinning to 4.x.
  - label: "Rename Spring Security SAML classes."
    text: >
      Replace all references to <code>OpenSaml4*</code> classes with their
      <code>OpenSaml5*</code> equivalents. The main classes are
      <code>OpenSaml5AuthenticationProvider</code> and
      <code>OpenSaml5AuthenticationRequestResolver</code>.
  - label: "Review custom SAML processing code."
    text: >
      If you directly use OpenSAML APIs (marshallers, unmarshallers, builders),
      review the OpenSAML 5 migration guide. The marshaller/unmarshaller
      split was removed and the object provider model changed.

scope_check: >
  Search for <code>opensaml</code> in your Maven/Gradle files, and for
  <code>OpenSaml4</code> in Java code. If your application uses SAML 2.0
  login (<code>saml2Login()</code> in your security config), you are affected.
  If you only use OAuth 2.0 / OIDC, this card does not apply.

watch_out:
  - >
    OpenSAML 5 requires Java 17+ and has different XML processing
    requirements. Verify your XML security libraries are compatible.
  - >
    If you have custom <code>Saml2AuthenticationRequestContext</code>
    processing or assertion decryption, those APIs may have changed
    signatures in the OpenSAML 5 upgrade.
  - >
    The Shibboleth Maven repository is still required for OpenSAML 5
    artifacts. Make sure your build still has that repository configured.

