id: javax-inject-removed
tier: 2
tier_label: "Won't Run"
title: "javax.inject Removed"
series: "spring-boot 3.5 → 4.0"
effort: S
openrewrite: true
verify: >
  App starts and @Inject fields are non-null — confirm via a test that
  autowires a bean registered with @Named

further_info: >
  Driven by the Jakarta EE transition completed in Spring Framework 7.0.
  The javax.inject:javax.inject:1 artifact still exists in Maven Central
  and still compiles. The break is at runtime: Spring Framework 7.0
  stopped recognising javax.inject annotations for dependency injection.
  Fields annotated with @Inject are not wired — they stay null.
  @Named beans may not be registered. No error is thrown at startup.
  The first NullPointerException at call time is your only clue.

oneliner: >
  Spring Framework 7.0 stopped processing javax.inject annotations.
  @Inject fields silently stay null. @Named beans may not be registered.
  The code compiles and the app starts. Nothing tells you it's broken.

error_output: |
  // No compile error — javax.inject:javax.inject still downloadable.
  // Failure is silent at runtime:

  @Named("orderService")
  public class OrderService {
      @Inject
      private OrderRepository repo;  // null on Boot 4.0 — never injected
  }

  // At call time:
  java.lang.NullPointerException: Cannot invoke
    "com.example.OrderRepository.findById(Long)"
    because "this.repo" is null

what_changed: >
  The <code>javax.inject:javax.inject</code> dependency is no longer on
  the Spring Boot classpath. Annotations like <code>@javax.inject.Inject</code>,
  <code>@javax.inject.Named</code>, and <code>@javax.inject.Singleton</code>
  are unavailable. The Jakarta equivalent is
  <code>jakarta.inject:jakarta.inject-api</code>.

why_changed: >
  The Jakarta EE transition moved all <code>javax.*</code> APIs to
  <code>jakarta.*</code>. Spring Framework 7.0 completed this transition
  by dropping support for the legacy <code>javax.inject</code> artifact.
  Only <code>jakarta.inject</code> is supported.

diffs:
  - comment: "// Java imports"
    removed: |
      import javax.inject.Inject;
      import javax.inject.Named;
    added: |
      import jakarta.inject.Inject;
      import jakarta.inject.Named;
  - comment: "// pom.xml — if you had an explicit dependency"
    removed: |
      <dependency>
          <groupId>javax.inject</groupId>
          <artifactId>javax.inject</artifactId>
          <version>1</version>
      </dependency>
    added: |
      <dependency>
          <groupId>jakarta.inject</groupId>
          <artifactId>jakarta.inject-api</artifactId>
      </dependency>
  - comment: "// Or just use Spring annotations"
    removed: |
      @Named("orderService")
      public class OrderService {
          @Inject
          private OrderRepository repo;
    added: |
      @Service("orderService")
      public class OrderService {
          @Autowired
          private OrderRepository repo;

fixes:
  - label: "Switch to jakarta.inject."
    text: >
      Replace <code>javax.inject</code> imports with
      <code>jakarta.inject</code>. The annotations are identical — only
      the package name changed. The <code>jakarta.inject-api</code>
      artifact is managed by the Spring Boot BOM.
  - label: "Switch to Spring annotations (recommended)."
    text: >
      Replace <code>@Inject</code> with <code>@Autowired</code> and
      <code>@Named</code> with <code>@Component</code> /
      <code>@Service</code> / <code>@Qualifier</code>. This removes the
      dependency on the inject API entirely.

scope_check: >
  Search for <code>javax.inject</code> in all Java/Kotlin sources and
  build files. Every <code>import javax.inject</code> statement needs
  updating. Also check for <code>javax.inject:javax.inject</code> in
  POM files.

watch_out:
  - >
    If you're using <code>@Inject</code> for CDI compatibility (e.g.,
    shared code between Spring and a Jakarta EE server), switch to
    <code>jakarta.inject</code> — it works in both environments. Don't
    switch to Spring-specific annotations if portability matters.
  - >
    Constructor injection with <code>@Inject</code> on a single-constructor
    class can simply remove the annotation entirely. Spring auto-detects
    single-constructor injection since 4.3.

footer_links:
