id: aspectj-observed
tier: 2
tier_label: "Won't Run"
title: "AspectJ Weaving Required for @Observed"
series: "spring-boot 3.5 → 4.0"
effort: S
openrewrite: false
verify: >
  Custom @Observed aspects fire and metrics appear in /actuator/metrics

further_info: >
  Introduced in Spring Framework 7.0 / Spring Boot 4.0. The ObservedAspect
  auto-configuration change is part of the broader Micrometer Observation
  API refactoring. Affects spring-boot-starter-actuator consumers using
  @Observed. See also: controller-spans-disabled,
  observability-dashboard-gaps.

oneliner: >
  Spring Boot 4.0 requires AspectJ-based weaving for the @Observed
  annotation to produce spans and metrics. Without the aspect
  configured, @Observed silently does nothing.

error_output: |
  # No startup error — this is a silent behaviour change.
  # Detected when @Observed methods produce no observations:

  @Observed(name = "order.process")
  public Order processOrder(OrderRequest request) { ... }

  # Expected in metrics:
  $ curl -s http://localhost:8080/actuator/metrics/order.process
  {"name":"order.process","measurements":[{"statistic":"COUNT","value":42.0}]}

  # Actual after upgrade:
  $ curl -s http://localhost:8080/actuator/metrics/order.process
  {"status":404,"error":"Not Found"}

  # No metric registered. No spans created. Method executes normally
  # but observability is completely missing.

what_changed: >
  In Spring Boot 3.x, <code>@Observed</code> worked via Spring AOP proxies
  with auto-configuration that registered the
  <code>ObservedAspect</code> bean automatically. In Spring Boot 4.0,
  the <code>ObservedAspect</code> auto-configuration requires explicit
  AspectJ weaving support. If your project does not have the AspectJ
  weaving dependency and configuration, the <code>@Observed</code>
  annotation is silently ignored.

why_changed: >
  The change aligns <code>@Observed</code> processing with proper
  AspectJ semantics, enabling it to work on non-proxied beans,
  self-invocations, and private methods. The proxy-based approach had
  known limitations that caused confusion when <code>@Observed</code>
  silently failed on internal method calls.

diffs:
  - comment: "// Maven dependency — add AspectJ weaver"
    removed: |
      <dependency>
          <groupId>io.micrometer</groupId>
          <artifactId>micrometer-tracing</artifactId>
      </dependency>
    added: |
      <dependency>
          <groupId>io.micrometer</groupId>
          <artifactId>micrometer-tracing</artifactId>
      </dependency>
      <dependency>
          <groupId>org.aspectj</groupId>
          <artifactId>aspectjweaver</artifactId>
      </dependency>
  - comment: "// Configuration — register ObservedAspect if not auto-configured"
    removed: "// ObservedAspect was auto-configured in Boot 3.x"
    added: |
      @Configuration
      public class ObservabilityConfig {
          @Bean
          public ObservedAspect observedAspect(ObservationRegistry registry) {
              return new ObservedAspect(registry);
          }
      }
  - comment: "// application.properties — enable AspectJ auto-proxy"
    removed: "# proxy-based AOP was sufficient"
    added: |
      spring.aop.auto=true

fixes:
  - label: "Add AspectJ weaver dependency."
    text: >
      Add <code>org.aspectj:aspectjweaver</code> to your dependencies.
      Spring Boot's dependency management provides the version. This
      enables the AspectJ-based processing of <code>@Observed</code>.
  - label: "Register ObservedAspect bean explicitly."
    text: >
      If the auto-configuration does not pick up the aspect, register
      an <code>ObservedAspect</code> bean manually in a
      <code>@Configuration</code> class. Pass the
      <code>ObservationRegistry</code> to its constructor.
  - label: "Verify AOP is enabled."
    text: >
      Ensure <code>spring.aop.auto=true</code> (the default) and that
      you have not disabled AspectJ auto-proxying. Check for
      <code>@EnableAspectJAutoProxy</code> if you have custom AOP
      configuration.

scope_check: >
  Search for <code>@Observed</code> annotations across your codebase.
  Every method annotated with <code>@Observed</code> is silently
  broken if AspectJ weaving is not configured. Also check if you
  depend on metrics or traces produced by <code>@Observed</code> in
  dashboards or alerts.

watch_out:
  - >
    This is completely silent. The application starts, methods execute,
    but no observations (metrics or traces) are recorded. You only
    discover it when monitoring dashboards show gaps.
  - >
    If you use <code>@Observed</code> on <code>@Repository</code> or
    <code>@Service</code> beans that are JDK dynamic proxies, ensure
    AspectJ weaving mode is compatible. CGLIB proxies are generally safer.
  - >
    Existing <code>@Timed</code> and <code>@Counted</code> annotations
    from Micrometer are separate from <code>@Observed</code> and may
    have their own configuration requirements. Check both.
  - >
    Load-time weaving (<code>-javaagent:aspectjweaver.jar</code>) gives
    the broadest coverage but requires JVM argument changes. Compile-time
    weaving requires build plugin changes. Choose based on your deployment
    model.

