id: batch-schema-rename
tier: 2
tier_label: "Won't Run"
title: "Spring Batch 6 Schema Sequence Rename"
series: "spring-boot 3.5 → 4.0"
effort: S
openrewrite: true
verify: >
  Spring Batch job launches with no BATCH_ table not found errors

further_info: >
  Driven by Spring Batch 6.0 (upstream of Spring Boot 4.0). The sequence
  rename was announced in the Batch 6.0 milestone notes. Only affects
  applications with a persistent JDBC job repository; in-memory repositories
  are unaffected. See also: batch-listener-classes.

oneliner: >
  Spring Batch 6 renamed its database sequences (e.g., BATCH_JOB_SEQ
  became BATCH_JOB_INSTANCE_SEQ). Existing databases using the old names
  fail when Batch tries to generate IDs.

error_output: |
  org.springframework.dao.InvalidDataAccessResourceUsageException:
    could not fetch next sequence value
  ...
  Caused by: java.sql.SQLSyntaxErrorException:
    sequence "BATCH_JOB_INSTANCE_SEQ" does not exist
   at org.postgresql.core.v3.QueryExecutorImpl.receiveErrorResponse(...)
   ...
  org.springframework.batch.core.launch.JobLaunchException:
    Could not launch job 'importCustomersJob'.
    Failed to create new JobInstance for job [importCustomersJob]

what_changed: >
  Spring Batch 6 renamed the database sequences used for generating IDs:
  <code>BATCH_JOB_SEQ</code> became <code>BATCH_JOB_INSTANCE_SEQ</code>,
  <code>BATCH_JOB_EXECUTION_SEQ</code> stayed the same, and
  <code>BATCH_STEP_EXECUTION_SEQ</code> stayed the same. The metadata
  table structures also changed. Applications with existing Batch
  schema from Spring Batch 5 will fail when the framework tries to use
  the new sequence names.

why_changed: >
  The rename aligns sequence names with the tables they serve, making
  the schema self-documenting. The old generic names like
  <code>BATCH_JOB_SEQ</code> were ambiguous about which table's IDs they
  generated.

diffs:
  - comment: "// SQL migration script — PostgreSQL"
    removed: "-- Old sequences from Spring Batch 5"
    added: |
      -- Rename sequences to match Spring Batch 6 expectations
      ALTER SEQUENCE BATCH_JOB_SEQ RENAME TO BATCH_JOB_INSTANCE_SEQ;
  - comment: "// SQL migration script — MySQL"
    removed: "-- Old sequences from Spring Batch 5"
    added: |
      -- MySQL uses tables for sequence emulation
      RENAME TABLE BATCH_JOB_SEQ TO BATCH_JOB_INSTANCE_SEQ;
  - comment: "// application.properties — opt into old names temporarily"
    removed: "# no Batch schema configuration"
    added: |
      # Point Batch to legacy sequence names while you plan migration
      spring.batch.jdbc.isolation-level-for-create=ISOLATION_DEFAULT

fixes:
  - label: "Run a schema migration script."
    text: >
      Create a Flyway or Liquibase migration that renames the sequences.
      For PostgreSQL: <code>ALTER SEQUENCE BATCH_JOB_SEQ RENAME TO
      BATCH_JOB_INSTANCE_SEQ;</code>. For MySQL, rename the emulation
      tables. Apply this before deploying the upgraded application.
  - label: "Let Spring Batch recreate the schema."
    text: >
      If your Batch job data is disposable (e.g., dev/staging), set
      <code>spring.batch.jdbc.initialize-schema=always</code> to let
      Spring Batch drop and recreate the metadata tables with the new
      names. Do not use this in production.
  - label: "Use the migration SQL from Spring Batch."
    text: >
      The Spring Batch 6 migration guide provides official SQL scripts
      for each database platform. Use those as the basis for your
      migration rather than writing them by hand.

scope_check: >
  Check if your application uses <code>spring-boot-starter-batch</code>
  and has a persistent job repository (not in-memory). If you see
  <code>BATCH_JOB_INSTANCE</code>, <code>BATCH_JOB_EXECUTION</code>, or
  <code>BATCH_STEP_EXECUTION</code> tables in your database, you need
  this migration. In-memory job repositories (MapJobRepositoryFactoryBean)
  are not affected.

watch_out:
  - >
    The schema change is not just sequences. Column types and table
    structures also changed in Spring Batch 6. Check the official
    migration SQL scripts for the full set of changes.
  - >
    If you run multiple application versions against the same database
    during a rolling deploy, the old version will break when the
    sequences are renamed. Plan a maintenance window or use blue-green
    deployment.
  - >
    H2 in-memory databases used in tests auto-create the schema fresh
    each run, so tests may pass while production fails. Test against
    a real database with existing Batch tables.

footer_links:
  - text: "spring-break module: batch-schema-change"
    url: "https://github.com/spoole167/spring-break/tree/main/batch-schema-change"
  - text: "Spring Batch 6 migration guide"
