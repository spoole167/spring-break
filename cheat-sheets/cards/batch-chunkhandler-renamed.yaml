id: batch-chunkhandler-renamed
tier: 1
tier_label: "Won't Build"
title: "Spring Batch ChunkHandler Renamed to ChunkRequestHandler"
series: "spring-boot 3.5 → 4.0"
effort: S
openrewrite: false
verify: >
  mvn compile: no cannot find symbol for ChunkHandler

further_info: >
  ChunkHandler belongs to the remote-chunking integration module. Verified
  in the same spring-break test module as the companion
  JobStep.setJobLauncher removal: the two renames fail in the same compile
  run but are otherwise unrelated.

oneliner: >
  ChunkHandler renamed to ChunkRequestHandler. Fails to compile on Boot 4.0.

error_output: |
  $ mvn compile
  [ERROR] /src/main/java/com/example/BatchRenamingUsage.java:[4,65]
    error: cannot find symbol
      symbol: class ChunkHandler
      location: package org.springframework.batch.integration.chunk

what_changed: >
  <code>org.springframework.batch.integration.chunk.ChunkHandler</code>
  has been renamed to <code>ChunkRequestHandler</code>.

why_changed: >
  The rename of <code>ChunkHandler</code> clarifies its role in the
  request/response model of remote chunking.

diffs:
  - comment: "// ChunkHandler rename"
    removed: |
      import org.springframework.batch.integration.chunk.ChunkHandler;
      // ...
      ChunkHandler handler = ...;
    added: |
      import org.springframework.batch.integration.chunk.ChunkRequestHandler;
      // ...
      ChunkRequestHandler handler = ...;

fixes:
  - label: "Rename ChunkHandler to ChunkRequestHandler."
    text: >
      Update the import and all references. Only the name changed; the
      interface contract is the same.

scope_check: >
  Search for <code>ChunkHandler</code> (not <code>ChunkRequestHandler</code>)
  across all Java/Kotlin sources. Affects remote chunking setups.

footer_links:
  - text: "spring-break module: batch-chunkhandler-renamed"
    url: "https://github.com/spoole167/spring-break/tree/main/batch-chunkhandler-renamed"
  - text: "Spring Batch 6.0 Migration Guide"
    url: "https://github.com/spring-projects/spring-batch/wiki/Spring-Batch-6.0-Migration-Guide"

subsystem: batch
