id: oauth-password-grant-removed
tier: 2
tier_label: "Won't Run"
title: "OAuth 2.0 Password Grant Completely Removed"
series: "spring-boot 3.5 → 4.0"
effort: L
openrewrite: false
verify: >
  Token endpoint returns 200 for auth code flow (not password grant)

further_info: >
  Driven by Spring Security 7.0. The OAuth 2.0 Resource Owner Password
  Credentials grant was deprecated in Security 5.x and is formally removed
  from the OAuth 2.1 specification (RFC 9700). Tracked in
  spring-security#6003. Affects spring-boot-starter-oauth2-client consumers.
  See also: pkce-mandatory.

oneliner: >
  Spring Security 7 removed all support for the OAuth 2.0 Resource Owner
  Password Credentials grant. Applications that use password grant for
  authentication fail at startup or return 401s at runtime.

error_output: |
  org.springframework.beans.factory.BeanCreationException:
    Error creating bean with name 'securityFilterChain'
  ...
  Caused by: java.lang.IllegalArgumentException:
    The grant type 'password' is not supported.
    Supported grant types are: [authorization_code, client_credentials,
    refresh_token, urn:ietf:params:oauth:grant-type:device_code,
    urn:ietf:params:oauth:grant-type:token-exchange]
   at org.springframework.security.oauth2.client.registration.ClientRegistration$Builder.build(...)
  ---
  APPLICATION FAILED TO START

what_changed: >
  The OAuth 2.0 Resource Owner Password Credentials grant (password grant)
  was deprecated in Spring Security 5.x and has been fully removed in
  Spring Security 7 (shipped with Spring Boot 4.0). The
  <code>ClientRegistration</code> builder rejects
  <code>authorization-grant-type: password</code>, and the
  <code>ResourceOwnerPasswordResourceDetails</code> class no longer exists.

why_changed: >
  The password grant requires users to give their credentials directly to
  the client application, which defeats the purpose of OAuth delegation.
  The OAuth 2.1 specification formally removed it. Spring Security aligned
  with that specification.

diffs:
  - comment: "// application.yml — client registration"
    removed: |
      spring:
        security:
          oauth2:
            client:
              registration:
                my-api:
                  authorization-grant-type: password
                  client-id: my-client
                  client-secret: secret
              provider:
                my-api:
                  token-uri: https://auth.example.com/oauth/token
    added: |
      spring:
        security:
          oauth2:
            client:
              registration:
                my-api:
                  authorization-grant-type: authorization_code
                  client-id: my-client
                  client-secret: secret
                  scope: openid,profile
                  redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
              provider:
                my-api:
                  issuer-uri: https://auth.example.com
  - comment: "// Java configuration — programmatic registration"
    removed: |
      ClientRegistration.withRegistrationId("legacy")
          .authorizationGrantType(AuthorizationGrantType.PASSWORD)
          .tokenUri("https://auth.example.com/oauth/token")
          .clientId("my-client")
          .clientSecret("secret")
          .build();
    added: |
      ClientRegistration.withRegistrationId("legacy")
          .authorizationGrantType(AuthorizationGrantType.AUTHORIZATION_CODE)
          .authorizationUri("https://auth.example.com/authorize")
          .tokenUri("https://auth.example.com/oauth/token")
          .redirectUri("{baseUrl}/login/oauth2/code/{registrationId}")
          .clientId("my-client")
          .clientSecret("secret")
          .build();

fixes:
  - label: "Migrate to Authorization Code + PKCE."
    text: >
      Replace the password grant with Authorization Code flow. For
      browser-based apps, use Authorization Code with PKCE. This is the
      recommended approach and requires changes to both the client
      application and possibly the authorization server configuration.
  - label: "Use Client Credentials for service-to-service."
    text: >
      If the password grant was used for machine-to-machine communication
      (no actual user), switch to the Client Credentials grant. This does
      not require user interaction.
  - label: "Custom token exchange as a last resort."
    text: >
      If you must support legacy systems that send username/password, implement
      a custom token exchange endpoint on your authorization server that accepts
      credentials and issues tokens. This keeps the anti-pattern in one
      controlled place while you plan a proper migration.

scope_check: >
  Search for <code>authorization-grant-type: password</code> in YAML/properties
  files and <code>AuthorizationGrantType.PASSWORD</code> in Java code.
  Also search for <code>ResourceOwnerPasswordResourceDetails</code> which was
  the OAuth 2.0 password grant helper class. Any hit means that
  authentication flow needs redesigning.

watch_out:
  - >
    This is not just a Spring change — OAuth 2.1 removed the password grant
    from the specification itself. Your authorization server (Keycloak,
    Auth0, Okta) may also drop support. Check both sides.
  - >
    Mobile apps that used password grant to avoid browser redirects should
    migrate to Authorization Code with PKCE, which modern mobile OAuth SDKs
    support natively.
  - >
    Integration tests that authenticate by posting username/password to the
    token endpoint will break. Update test helpers to use a test-specific
    grant flow or mock the security context directly.

