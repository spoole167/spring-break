id: javax-annotation-removed
tier: 2
tier_label: "Won't Run"
title: "javax.annotation Removed"
series: "spring-boot 3.5 → 4.0"
effort: S
openrewrite: true
verify: >
  App starts and @PostConstruct methods fire — confirm via log output or
  assert that initialisation state is set after context loads

further_info: >
  Driven by the Jakarta EE transition completed in Spring Framework 7.0.
  The javax.annotation:javax.annotation-api artifact still exists in
  Maven Central and still compiles. The break is at runtime: Spring
  Framework 7.0 stopped processing javax.annotation lifecycle callbacks.
  @PostConstruct methods silently never fire. @Resource injection silently
  does nothing. No error is thrown — behaviour just changes.
  @PostConstruct in particular is extremely common — almost every Spring
  application that has initialisation logic uses it.

oneliner: >
  Spring Framework 7.0 stopped processing javax.annotation lifecycle
  annotations. @PostConstruct and @PreDestroy methods silently never
  fire. The code compiles. Nothing tells you something is wrong.

error_output: |
  // No compile error — javax.annotation-api is still downloadable.
  // Failure is silent at runtime:

  @PostConstruct
  public void init() {
      this.ready = true;  // never called on Boot 4.0
  }

  // Later in a test or endpoint:
  java.lang.NullPointerException: Cannot invoke method because 'this.cache' is null
  // or simply: assertions on initialisation state fail unexpectedly

what_changed: >
  The <code>javax.annotation:javax.annotation-api</code> dependency is
  no longer on the Spring Boot classpath. Annotations
  <code>@javax.annotation.PostConstruct</code>,
  <code>@javax.annotation.PreDestroy</code>, and
  <code>@javax.annotation.Resource</code> are unavailable. The Jakarta
  equivalent is <code>jakarta.annotation:jakarta.annotation-api</code>,
  managed by the Boot BOM. See also: javax-inject-removed.

why_changed: >
  The Jakarta EE transition moved all <code>javax.*</code> APIs to
  <code>jakarta.*</code>. Spring Framework 7.0 completed this transition
  by dropping the legacy <code>javax.annotation</code> artifact.

diffs:
  - comment: "// Java imports"
    removed: |
      import javax.annotation.PostConstruct;
      import javax.annotation.PreDestroy;
    added: |
      import jakarta.annotation.PostConstruct;
      import jakarta.annotation.PreDestroy;
  - comment: "// pom.xml — if you had an explicit dependency"
    removed: |
      <dependency>
          <groupId>javax.annotation</groupId>
          <artifactId>javax.annotation-api</artifactId>
          <version>1.3.2</version>
      </dependency>
    added: |
      <dependency>
          <groupId>jakarta.annotation</groupId>
          <artifactId>jakarta.annotation-api</artifactId>
      </dependency>

fixes:
  - label: "Switch to jakarta.annotation."
    text: >
      Replace <code>javax.annotation</code> imports with
      <code>jakarta.annotation</code>. The annotations are identical —
      only the package name changed. The
      <code>jakarta.annotation-api</code> artifact is managed by the
      Spring Boot BOM so no version is needed.
  - label: "Remove explicit dependency version."
    text: >
      If you declared <code>javax.annotation-api</code> explicitly in
      your POM, replace it with <code>jakarta.annotation-api</code>
      and omit the version — Boot's BOM manages it.

scope_check: >
  Search for <code>javax.annotation</code> in all Java/Kotlin sources
  and build files. Pay particular attention to <code>@PostConstruct</code>
  — it appears in almost every service class with initialisation logic.
  Also check for <code>javax.annotation:javax.annotation-api</code> in
  POM files and Gradle build scripts.

watch_out:
  - >
    <code>@PostConstruct</code> is silently skipped if the import is
    wrong — there is no error at startup, the method simply never runs.
    If your cache, connection pool, or scheduled task isn't initialising,
    a missing <code>@PostConstruct</code> is the first thing to check.
  - >
    <code>@Resource</code> (JSR-250 named injection) also lives in
    <code>javax.annotation</code>. If you use it for JNDI lookups or
    named bean injection, that import needs updating too.

footer_links:
  - text: "spring-break module: javax-annotation-removed"
    url: "https://github.com/spoole167/spring-break/tree/main/javax-annotation-removed"
  - text: "Spring Boot 4.0 Migration Guide"
    url: "https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide"
