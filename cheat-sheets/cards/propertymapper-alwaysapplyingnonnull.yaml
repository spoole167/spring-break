id: propertymapper-alwaysapplyingnonnull
tier: 1
tier_label: "Won't Build"
title: "PropertyMapper.alwaysApplyingWhenNonNull() Removed"
series: "spring-boot 3.5 → 4.0"
effort: S
openrewrite: false
verify: >
  mvn compile — no cannot find symbol for alwaysApplyingWhenNonNull

further_info: >
  PropertyMapper is an internal Spring Boot utility used mostly in
  autoconfiguration classes to map configuration properties onto builder
  objects. alwaysApplyingWhenNonNull() was the opt-in way to skip null
  values. In Spring Boot 4.0 that behaviour became the default, making
  the method redundant.

oneliner: >
  PropertyMapper.alwaysApplyingWhenNonNull() is removed because skipping
  null values is now the default. Just delete the call.

error_output: |
  $ mvn compile
  [ERROR] /src/main/java/com/example/PropertyMapperUsage.java:[8,47]
    error: cannot find symbol
      symbol:   method alwaysApplyingWhenNonNull()
      location: class PropertyMapper

what_changed: >
  <code>PropertyMapper.alwaysApplyingWhenNonNull()</code> has been removed
  because its behaviour — skipping mappings when the source value is
  <code>null</code> — is now the default behaviour of <code>PropertyMapper</code>.
  Calling it was a no-op from 4.0 onward, so the method was removed.

why_changed: >
  The non-null default was the right behaviour for virtually all use cases.
  Requiring an explicit opt-in call was boilerplate with no practical reason
  to exist. Making it the default and removing the method simplifies the API.

diffs:
  - comment: "// Remove the method call — the behaviour is now default"
    removed: "PropertyMapper map = PropertyMapper.get().alwaysApplyingWhenNonNull();"
    added: "PropertyMapper map = PropertyMapper.get();"

fixes:
  - label: "Delete the alwaysApplyingWhenNonNull() call."
    text: >
      Simply remove <code>.alwaysApplyingWhenNonNull()</code> from the chain.
      The mapper behaves identically on Boot 4.0 without it.
      If you explicitly want to map null values, use <code>.always()</code>
      on individual mappings.

scope_check: >
  Search for <code>alwaysApplyingWhenNonNull</code> across all Java/Kotlin sources.
  This typically appears in autoconfiguration classes or custom configuration
  adapters that mirror Spring Boot's internal style.

watch_out:
  - >
    If you were relying on the absence of <code>alwaysApplyingWhenNonNull()</code>
    to intentionally map null values through, that behaviour has also changed —
    nulls are now skipped by default. Add <code>.always()</code> on the
    specific mappings that need to pass nulls.

