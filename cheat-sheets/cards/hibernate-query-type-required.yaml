id: hibernate-query-type-required
tier: 2
tier_label: "Won't Run"
title: "Hibernate Untyped Join Query Rejected at Runtime"
series: "spring-boot 3.5 → 4.0"
effort: S
openrewrite: false
verify: >
  HQL join queries without explicit SELECT or result type execute without
  SemanticException

further_info: >
  Introduced in Hibernate 7.0 (upstream of Spring Boot 4.0). Hibernate 6.x
  tolerated ambiguous HQL queries — a join with no explicit SELECT clause and
  no result type was silently treated as returning Object[]. Hibernate 7.0
  treats this as a semantic error. Affects any application using
  Session.createQuery(String) with join queries and no result type.

oneliner: >
  Hibernate 7 rejects untyped join queries with no explicit SELECT clause.
  A query that silently returned Object[] on Boot 3.5 throws SemanticException
  at runtime on Boot 4.0.

error_output: |
  // Query without explicit result type
  session.createQuery("from Product p join p.category c").getResultList();

  // Boot 3.5 (Hibernate 6.x): runs fine, returns List<Object[]>

  // Boot 4.0 (Hibernate 7.x): throws at runtime
  org.hibernate.query.SemanticException:
    Query has no explicit SELECT and multiple query roots are defined.
    An explicit SELECT clause is required when multiple query roots exist
    or when the query contains a JOIN.

what_changed: >
  Hibernate 7.0 tightened validation of HQL queries. A query like
  <code>from Product p join p.category c</code> has two implicit query
  roots (Product and the joined Category). Without an explicit
  <code>SELECT</code> clause or result type, the return type is ambiguous.
  Hibernate 6.x silently resolved this as <code>Object[]</code>; Hibernate 7.0
  rejects it at parse time with a <code>SemanticException</code>.

why_changed: >
  Silent return of <code>Object[]</code> hides intent and causes surprising
  <code>ClassCastException</code> at the point of use rather than at the
  query. Making the ambiguity a hard error forces the developer to be explicit,
  which produces clearer, more maintainable queries.

diffs:
  - comment: "// Add an explicit SELECT and result type"
    removed: |
      session.createQuery("from Product p join p.category c")
             .getResultList();
    added: |
      session.createQuery(
          "SELECT p FROM Product p JOIN p.category c",
          Product.class
      ).getResultList();
  - comment: "// Or use a typed tuple query"
    removed: |
      session.createQuery("from Product p join p.category c")
             .getResultList();
    added: |
      session.createQuery(
          "SELECT p, c FROM Product p JOIN p.category c",
          Object[].class
      ).getResultList();

fixes:
  - label: "Add explicit SELECT clause and result type (recommended)."
    text: >
      All <code>Session.createQuery(String)</code> calls with join queries
      must include an explicit <code>SELECT</code> clause. Pass the expected
      result class as the second argument: <code>createQuery(hql, Entity.class)</code>.
  - label: "Search for bare 'from' queries."
    text: >
      Grep for <code>createQuery("from</code> and <code>createQuery('from</code>
      in your codebase. Any query that starts with <code>from</code> and
      contains a join is at risk.

scope_check: >
  Search for <code>createQuery(</code> calls in your application. Any
  HQL query that starts with <code>from</code> (implicit SELECT) and
  contains a <code>join</code> will throw <code>SemanticException</code>
  on Hibernate 7. JPQL queries via <code>EntityManager.createQuery(String, Class)</code>
  are also affected if they omit the <code>SELECT</code> clause with joins.

watch_out:
  - >
    The query compiles and runs on Boot 3.5 without any warning. The
    failure only surfaces on Boot 4.0 at the first call site, not at
    startup. Tests that exercise query paths are the only way to catch
    this before production.
  - >
    Simple queries without joins are unaffected — <code>from Product p</code>
    with a single root remains valid. Only multi-root or joined queries
    trigger the error.

