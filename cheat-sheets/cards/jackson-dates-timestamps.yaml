id: jackson-dates-timestamps
tier: 3
tier_label: "Wrong Results"
title: "write-dates-as-timestamps Config Silently Not Applied"
series: "spring-boot 3.5 → 4.0"
effort: M
openrewrite: false
verify: >
  Date fields serialize as ISO-8601 strings, not numeric timestamps

further_info: >
  Driven by the combination of Jackson 3.0 and Spring Boot 4.0's
  auto-configuration changes. The spring.jackson.serialization.* property
  binding was removed because Jackson 3.0 reorganised its feature flag
  system. Compounds with jackson-date-format. See also: jackson-date-format,
  jackson-property-inclusion.

oneliner: >
  The <code>spring.jackson.serialization.write-dates-as-timestamps</code>
  property is silently ignored in Boot 4.0. Your explicit timestamp
  configuration stops working.

error_output: |
  # application.properties (still present, no warning)
  spring.jackson.serialization.write-dates-as-timestamps=true

  // API response — before (Spring Boot 3.5, property honoured)
  {"timestamp": 1714089600000, "expiry": 1714176000000}

  // API response — after (Spring Boot 4.0, property ignored)
  {"timestamp": "2025-04-26T00:00:00Z", "expiry": "2025-04-27T00:00:00Z"}

  // Mobile app crash log
  java.lang.NumberFormatException: For input string: "2025-04-26T00:00:00Z"

what_changed: >
  Spring Boot 4.0's Jackson auto-configuration no longer applies the
  <code>spring.jackson.serialization.*</code> feature toggles to the Jackson 3
  ObjectMapper. The property remains in your config with no startup warning,
  but the serialisation feature is never enabled. Jackson 3's own default
  (ISO-8601 strings) takes effect instead.

why_changed: >
  Jackson 3 reorganised its feature flag system. The old
  <code>SerializationFeature</code> enum values don't map one-to-one to the
  new configuration API. Spring Boot's property-to-feature binding was
  removed to avoid incorrect mappings, but the removal wasn't flagged as a
  breaking change in early milestones.

diffs:
  - comment: "// application.properties — old (silently ignored)"
    removed: "spring.jackson.serialization.write-dates-as-timestamps=true"
    added: "# Removed — configure via ObjectMapper customiser instead"
  - comment: "// ObjectMapper customiser replacement"
    removed: "# (relied on spring.jackson.serialization.write-dates-as-timestamps)"
    added: |
      @Bean
      public Jackson2ObjectMapperBuilderCustomizer timestampDates() {
          return builder -> builder.featuresToEnable(
              SerializationFeature.WRITE_DATES_AS_TIMESTAMPS
          );
      }
  - comment: "// Alternative: per-field annotation"
    removed: "private Instant timestamp;"
    added: |
      @JsonFormat(shape = JsonFormat.Shape.NUMBER)
      private Instant timestamp;

fixes:
  - label: "Register an ObjectMapper customiser bean."
    text: >
      Create a <code>Jackson2ObjectMapperBuilderCustomizer</code> that
      explicitly enables <code>WRITE_DATES_AS_TIMESTAMPS</code>. This
      replaces the dead properties-based config.
  - label: "Migrate clients to ISO-8601 (recommended)."
    text: >
      If you can coordinate with API consumers, drop the timestamp format
      entirely and adopt ISO-8601 strings. Remove the old property and
      let Jackson 3's new default take effect.

scope_check: >
  Search your <code>application.properties</code> and
  <code>application.yml</code> files for any
  <code>spring.jackson.serialization</code> or
  <code>spring.jackson.deserialization</code> entries. Every one of those
  feature toggles is potentially dead in Boot 4.0.

watch_out:
  - >
    This compounds with the jackson-date-format change. If you set
    <code>write-dates-as-timestamps=true</code> specifically to keep numeric
    timestamps, you now have two problems: the default flipped AND your
    override is ignored. You get ISO strings regardless.
  - >
    Other <code>spring.jackson.serialization.*</code> and
    <code>spring.jackson.deserialization.*</code> properties may also be
    silently ignored. Audit all of them, not just the date-related ones.

footer_links:
