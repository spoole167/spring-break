id: retry-semantics-change
tier: 3
tier_label: "Wrong Results"
title: "maxAttempts Now Means Retries, Not Total Attempts"
series: "spring-boot 3.5 → 4.0"
effort: M
openrewrite: false
verify: >
  Retried operations use correct backoff timing and max attempts

further_info: >
  Driven by Spring Retry 2.x (upstream of Spring Boot 4.0). The maxAttempts
  parameter changed from meaning total attempts to meaning retry count
  (excluding the initial call). Spring Retry was also removed from the Boot
  BOM in 4.0, requiring an explicit version. See also: spring-retry-bom,
  retryable-transaction-order.

oneliner: >
  <code>@Retryable(maxAttempts = 3)</code> now performs 3 retries (4 total
  calls) instead of 3 total attempts. Your retry budget silently doubles.

error_output: |
  // Before (Spring Boot 3.5): 3 total attempts
  INFO  Calling payment service (attempt 1/3)
  WARN  Payment failed, retrying...
  INFO  Calling payment service (attempt 2/3)
  WARN  Payment failed, retrying...
  INFO  Calling payment service (attempt 3/3)
  ERROR Payment failed after 3 attempts

  // After (Spring Boot 4.0): 1 initial + 3 retries = 4 total
  INFO  Calling payment service (attempt 1/4)
  WARN  Payment failed, retrying...
  INFO  Calling payment service (attempt 2/4)
  WARN  Payment failed, retrying...
  INFO  Calling payment service (attempt 3/4)
  WARN  Payment failed, retrying...
  INFO  Calling payment service (attempt 4/4)
  ERROR Payment failed after 4 attempts

  // Integration test failure
  Expected invocation count: 3
    Actual invocation count: 4

what_changed: >
  The <code>maxAttempts</code> parameter in <code>@Retryable</code> changed
  semantics. In Spring Retry 1.x (Boot 3.5), it meant total attempts
  including the initial call. In the new version (Boot 4.0), it means the
  number of retries after the initial call. So <code>maxAttempts = 3</code>
  now results in 4 total calls.

why_changed: >
  The old naming was misleading — "max attempts" of 3 producing only 2
  retries was a constant source of off-by-one bugs. The new semantics align
  the parameter name with its actual meaning: the number of retry attempts.

diffs:
  - comment: "// Fix: reduce maxAttempts by 1 to preserve old behaviour"
    removed: "@Retryable(maxAttempts = 3)"
    added: "@Retryable(maxAttempts = 2)  // 1 initial + 2 retries = 3 total"
  - comment: "// Or use the new explicit parameter"
    removed: "@Retryable(maxAttempts = 3)"
    added: "@Retryable(retries = 2)  // clearer: 2 retries after initial call"
  - comment: "// RetryTemplate configuration"
    removed: |
      RetryTemplate template = RetryTemplate.builder()
          .maxAttempts(3)
          .build();
    added: |
      RetryTemplate template = RetryTemplate.builder()
          .maxAttempts(2)  // was 3 — now means retries, not total
          .build();

fixes:
  - label: "Subtract 1 from every maxAttempts value."
    text: >
      Search for all <code>@Retryable</code> annotations and
      <code>RetryTemplate</code> configurations. Reduce each
      <code>maxAttempts</code> value by 1 to preserve the original total
      attempt count.
  - label: "Audit retry budgets."
    text: >
      The extra attempt may be acceptable or even desirable. Review each
      retry site and decide whether the new count is correct. Document
      the intended behaviour either way.

scope_check: >
  Search for <code>@Retryable</code>, <code>RetryTemplate</code>, and any
  <code>maxAttempts</code> configuration in properties files. Every instance
  is now making one extra call than before. For services with tight SLAs or
  rate-limited downstream APIs, this can cause cascading failures.

watch_out:
  - >
    The extra retry is invisible in logs unless you count carefully.
    Services with exponential backoff will take longer to fail — a
    <code>maxAttempts = 5</code> with 2-second backoff now takes
    62 seconds total instead of 30.
  - >
    If your downstream service has rate limiting, the extra call per
    failure scenario may push you over the limit. Multiply the extra
    attempt by your error rate to estimate the impact.

footer_links:
