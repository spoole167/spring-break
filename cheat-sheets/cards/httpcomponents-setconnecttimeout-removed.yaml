id: httpcomponents-setconnecttimeout-removed
tier: 1
tier_label: "Won't Build"
title: "HttpClient setSocketTimeout Removed"
series: "spring-boot 3.5 → 4.0"
effort: S
openrewrite: false
verify: >
  mvn compile — no cannot find symbol for setSocketTimeout

further_info: >
  Apache HttpClient 5.x (used in Spring Boot 3.x and 4.0) replaced the
  integer-based timeout methods of HttpClient 4.x with strongly-typed
  Timeout objects. This is a pre-existing 4.x→5.x break that surfaces
  when migrating from Spring Boot 2.x directly to 4.0.

oneliner: >
  RequestConfig.Builder.setSocketTimeout(int) is gone in HttpClient 5.
  Use setResponseTimeout(Timeout) instead.

error_output: |
  $ mvn compile
  [ERROR] /src/main/java/com/example/HttpComponentsUsage.java:[12,18]
    error: cannot find symbol
      symbol:   method setSocketTimeout(int)
      location: class RequestConfig.Builder

what_changed: >
  Apache HttpClient 5.x removed the integer-millisecond timeout methods
  (<code>setSocketTimeout(int)</code>, <code>setConnectTimeout(int)</code>,
  <code>setConnectionRequestTimeout(int)</code>) and replaced them with
  overloads that take a strongly-typed
  <code>org.apache.hc.core5.util.Timeout</code> object.

why_changed: >
  The integer-millisecond API was ambiguous about units and lacked
  null-safety. <code>Timeout</code> is explicit about the time unit,
  supports nanosecond precision, and can represent "no timeout" cleanly.

diffs:
  - comment: "// Timeout configuration"
    removed: |
      RequestConfig.custom()
          .setSocketTimeout(5000)
          .setConnectTimeout(3000)
          .build();
    added: |
      import org.apache.hc.core5.util.Timeout;

      RequestConfig.custom()
          .setResponseTimeout(Timeout.ofMilliseconds(5000))
          .setConnectTimeout(Timeout.ofMilliseconds(3000))
          .build();

fixes:
  - label: "Replace int timeouts with Timeout objects."
    text: >
      Import <code>org.apache.hc.core5.util.Timeout</code> and replace each
      integer-millisecond call with its <code>Timeout.ofMilliseconds(n)</code>
      equivalent. Also note that <code>setSocketTimeout</code> is now called
      <code>setResponseTimeout</code>.

scope_check: >
  Search for <code>setSocketTimeout</code>, <code>setConnectTimeout</code>,
  and <code>setConnectionRequestTimeout</code> taking integer arguments
  across all Java/Kotlin sources. Custom HTTP client configuration classes
  and RestTemplate factory beans are the most common locations.

watch_out:
  - >
    <code>setSocketTimeout</code> maps to <code>setResponseTimeout</code>
    in HttpClient 5 — the name changed, not just the type. A search-and-replace
    on the method name alone will miss this.

footer_links:
  - text: "spring-break module: httpcomponents-setconnecttimeout-removed"
    url: "https://github.com/spoole167/spring-break/tree/main/httpcomponents-setconnecttimeout-removed"
