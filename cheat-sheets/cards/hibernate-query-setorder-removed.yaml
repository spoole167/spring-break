id: hibernate-query-setorder-removed
tier: 1
tier_label: "Won't Build"
title: "Hibernate SelectionQuery.setOrder() Removed"
series: "spring-boot 3.5 → 4.0"
effort: S
openrewrite: false
verify: >
  mvn compile — no cannot find symbol for setOrder on SelectionQuery

further_info: >
  setOrder() was introduced in Hibernate 6.x as an @Incubating API for
  programmatic ordering, intended to support Jakarta Data. It was never
  stable and was removed in Hibernate 7.0. Any code that adopted it
  during the 6.x window must now migrate to HQL ORDER BY or the
  SelectionSpecification API.

oneliner: >
  Hibernate's incubating SelectionQuery.setOrder() was removed in 7.0.
  Use an ORDER BY clause in HQL instead.

error_output: |
  $ mvn compile
  [ERROR] /src/main/java/com/example/HibernateQueryUsage.java:[14,15]
    error: cannot find symbol
      symbol:   method setOrder(java.util.List)
      location: interface SelectionQuery<Product>

what_changed: >
  The <code>@Incubating</code> <code>setOrder(List&lt;Order&gt;)</code> method
  on <code>SelectionQuery</code> (and <code>Query</code>) was removed in
  Hibernate 7.0. It had been added in Hibernate 6.x as part of Jakarta Data
  integration work but was never promoted to stable API.

why_changed: >
  The method was always experimental. Hibernate 7.0 completed the Jakarta Data
  integration under a different, more stable API surface and removed the
  incubating intermediate.

diffs:
  - comment: "// Programmatic order via removed setOrder()"
    removed: |
      SelectionQuery<Product> query =
          session.createSelectionQuery("from Product", Product.class);
      query.setOrder(List.of(Order.asc(Product.class, "name")));
  - comment: "// Fix: inline ORDER BY in HQL"
    added: |
      SelectionQuery<Product> query =
          session.createSelectionQuery("from Product order by name asc", Product.class);

fixes:
  - label: "Move ordering into the HQL query string."
    text: >
      Add an <code>ORDER BY</code> clause directly to the HQL/JPQL string.
      This is the most portable approach and works on both 3.5 and 4.0.
  - label: "Use CriteriaQuery with Order."
    text: >
      For fully programmatic ordering, use the JPA Criteria API:
      <code>criteriaQuery.orderBy(builder.asc(root.get("name")))</code>.
      This is the stable alternative.

scope_check: >
  Search for <code>.setOrder(</code> on query objects across all repository
  and data-access classes. This is uncommon outside of code written
  specifically to experiment with the Hibernate 6.x incubating API.

watch_out:
  - >
    <code>org.hibernate.query.Order</code> (the parameter type) is also
    affected. If you imported it, that import can be removed once you
    stop using <code>setOrder</code>.

footer_links:
