id: null-marked-default
tier: 3
tier_label: "Wrong Results"
title: "@NullMarked Default — IDE/Compiler Null Safety"
series: "spring-boot 3.5 → 4.0"
effort: M
openrewrite: false
no_module: true
no_module_reason: "Compile-time and IDE-only change — the card explicitly states runtime behaviour is unchanged; no JUnit assertion is meaningful"
verify: >
  No new NullPointerException at boundaries where nulls were OK before

further_info: >
  Introduced in Spring Framework 7.0 using JSpecify @NullMarked annotations
  at the package level. This is a compile-time / IDE-time change; runtime
  behaviour is unchanged. Kotlin interop improves because the compiler can
  now infer nullability from Spring APIs. Affects all Spring Framework API
  consumers.

oneliner: >
  Spring Framework 7 applies <code>@NullMarked</code> to all packages.
  IDEs and null-checking tools now flag your existing null-passing code
  as warnings or errors — even though the runtime behaviour is unchanged.

error_output: |
  // Your existing code — unchanged, worked fine in Boot 3.5
  ApplicationContext ctx = new AnnotationConfigApplicationContext(AppConfig.class);
  String name = ctx.getEnvironment().getProperty("app.name");
  int length = name.length();  // ← IDE warning: name may be null

  // IntelliJ inspection results after upgrade
  WARNING: Method invocation 'length' may produce NullPointerException
    at MyService.java:42
  WARNING: Passing 'null' argument to parameter annotated as @NonNull
    at MyConfig.java:18

  // If using -Werror or NullAway/ErrorProne
  $ mvn compile
  [ERROR] MyService.java:[42,24] error: [NullAway] dereferencing expression
    name, which is @Nullable
  [ERROR] MyConfig.java:[18,35] error: [NullAway] passing @Nullable parameter
    where @NonNull is required

what_changed: >
  Spring Framework 7 added <code>@NullMarked</code> (from JSpecify) at the
  package level across the entire framework. This means all method parameters
  and return types are assumed <code>@NonNull</code> by default unless
  explicitly annotated <code>@Nullable</code>. IDEs, static analysis tools,
  and compile-time null checkers now see Spring's null contracts and flag
  violations.

why_changed: >
  Null safety has been a long-standing request. By declaring null contracts
  formally, the framework helps tools catch <code>NullPointerException</code>
  bugs at compile time instead of runtime. Kotlin interop also improves —
  Kotlin's type system can now correctly infer nullability from Spring APIs.

diffs:
  - comment: "// Handle nullable return from getProperty()"
    removed: |
      String name = env.getProperty("app.name");
      return name.toUpperCase();
    added: |
      String name = env.getProperty("app.name");
      if (name == null) {
          throw new IllegalStateException("app.name not configured");
      }
      return name.toUpperCase();
  - comment: "// Or use the non-null variant"
    removed: "String name = env.getProperty(\"app.name\");"
    added: "String name = env.getRequiredProperty(\"app.name\");"
  - comment: "// Suppress warnings during migration"
    removed: "// (no null warnings in Boot 3.5)"
    added: |
      // Temporarily suppress in build.gradle
      tasks.withType(JavaCompile) {
          options.compilerArgs += ['-Xlint:-nullness']
      }

fixes:
  - label: "Fix null handling in your code (recommended)."
    text: >
      Follow the IDE warnings and add null checks, use
      <code>Optional</code>, or switch to non-null API variants like
      <code>getRequiredProperty()</code>. These are real potential NPE
      bugs that were always there — the framework is now telling you
      about them.
  - label: "Suppress during migration."
    text: >
      If the volume of warnings is too high to fix at once, suppress
      null-checking warnings at the compiler level and create a backlog
      to address them incrementally. Don't leave the suppression in
      place permanently.

scope_check: >
  Open your project in IntelliJ or VS Code with Java support and look at
  the new inspection warnings. Any code that passes <code>null</code> to a
  Spring API parameter, or uses a Spring API return value without a null
  check, will be flagged. The volume depends on how much Spring API surface
  your code touches directly.

watch_out:
  - >
    If your CI pipeline uses <code>-Werror</code>, NullAway, ErrorProne, or
    Checker Framework, the new null annotations will turn warnings into
    build failures. Your build breaks not because of code changes, but
    because the framework's null contracts are now visible to your tools.
  - >
    Kotlin projects are affected differently. Kotlin's compiler uses these
    annotations to infer platform types. A Spring method that returned
    <code>String!</code> (platform type, nullable unknown) now returns
    <code>String</code> (non-null) or <code>String?</code> (nullable).
    Kotlin code that didn't handle nullability may now fail to compile.

footer_links:
  - text: "Spring Boot 4.0 Migration Guide"
    url: "https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide"
