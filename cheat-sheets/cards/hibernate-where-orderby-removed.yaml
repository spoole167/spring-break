id: hibernate-where-orderby-removed
tier: 1
tier_label: "Won't Build"
title: "Hibernate @Where and @OrderBy Removed"
series: "spring-boot 3.5 → 4.0"
effort: S
openrewrite: false
verify: >
  mvn compile — no cannot find symbol for @Where or @OrderBy from Hibernate

further_info: >
  @SQLRestriction and @SQLOrder were introduced in Hibernate 6.3 as the
  designated replacements. The old annotations were deprecated then and
  removed in Hibernate 7.0. Note: JPA's @jakarta.persistence.OrderBy
  (which sorts by entity attribute) is unaffected — only Hibernate's
  SQL-string variants are gone.

oneliner: >
  Hibernate's @Where and @OrderBy are removed. Replace with @SQLRestriction
  and @SQLOrder.

error_output: |
  $ mvn compile
  [ERROR] /src/main/java/com/example/User.java:[5,39]
    error: cannot find symbol
      symbol: class Where
      location: package org.hibernate.annotations
  [ERROR] /src/main/java/com/example/User.java:[6,39]
    error: cannot find symbol
      symbol: class OrderBy
      location: package org.hibernate.annotations

what_changed: >
  <code>@org.hibernate.annotations.Where</code> and
  <code>@org.hibernate.annotations.OrderBy</code> have been removed.
  The replacements are <code>@org.hibernate.annotations.SQLRestriction</code>
  and <code>@org.hibernate.annotations.SQLOrder</code>, which take the
  same SQL fragment arguments.

why_changed: >
  The new annotation names make it explicit that the argument is a raw
  SQL fragment, not a JPQL or HQL expression. This avoids confusion with
  the JPA <code>@OrderBy</code> (which takes attribute names) and with
  Hibernate's HQL-level features.

diffs:
  - comment: "// Entity annotations"
    removed: |
      import org.hibernate.annotations.Where;
      import org.hibernate.annotations.OrderBy;

      @OneToMany
      @Where(clause = "deleted = false")
      @OrderBy(clause = "name desc")
      private List<Post> posts;
    added: |
      import org.hibernate.annotations.SQLRestriction;
      import org.hibernate.annotations.SQLOrder;

      @OneToMany
      @SQLRestriction("deleted = false")
      @SQLOrder("name desc")
      private List<Post> posts;

fixes:
  - label: "Replace @Where with @SQLRestriction."
    text: >
      Change the annotation name and attribute: <code>@Where(clause = "...")</code>
      becomes <code>@SQLRestriction("...")</code>. The SQL fragment is the same.
  - label: "Replace @OrderBy with @SQLOrder."
    text: >
      Change the annotation name and attribute: <code>@OrderBy(clause = "...")</code>
      becomes <code>@SQLOrder("...")</code>. Do not confuse with JPA's
      <code>@jakarta.persistence.OrderBy</code>, which is a separate annotation
      taking attribute names and is unaffected.

scope_check: >
  Search for <code>@Where</code> and <code>@OrderBy</code> from the
  <code>org.hibernate.annotations</code> package across all entity classes
  and embeddables. Also check <code>@WhereJoinTable</code> if used.

watch_out:
  - >
    If you have both <code>@jakarta.persistence.OrderBy</code> and
    <code>@org.hibernate.annotations.OrderBy</code> in use, only the
    Hibernate one needs replacing. The JPA one is untouched.

