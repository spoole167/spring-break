id: jackson-class-renames
tier: 1
tier_label: "Won't Build"
title: "Jackson Class Renames"
series: "spring-boot 3.5 → 4.0"
effort: M
openrewrite: true
verify: >
  mvn compile — no JsonSerializer/SerializerProvider errors

further_info: >
  Driven by Jackson 3.0 (upstream of Spring Boot 4.0). JsonSerializer became
  ValueSerializer, SerializerProvider became SerializationContext, and
  JsonDeserializer became ValueDeserializer. The rename was finalised in
  Jackson 3.0-rc1. Affects all spring-boot-starter-json consumers with
  custom serialisers. See also: jackson-group-id,
  jackson-exception-hierarchy.

oneliner: >
  Jackson 3.0 renamed core classes like JsonSerializer, JsonDeserializer,
  and SerializerProvider. Every custom serialiser is now broken.

error_output: |
  $ mvn compile
  [ERROR] /src/main/java/com/example/DateSerializer.java:[4,44]
    error: cannot find symbol
      symbol:   class JsonSerializer
      location: package tools.jackson.databind
  [ERROR] /src/main/java/com/example/DateSerializer.java:[12,47]
    error: cannot find symbol
      symbol:   class SerializerProvider
      location: package tools.jackson.databind

what_changed: >
  Jackson 3.0 renamed several core classes:
  <code>JsonSerializer</code> became <code>ValueSerializer</code>,
  <code>JsonDeserializer</code> became <code>ValueDeserializer</code>,
  <code>SerializerProvider</code> became <code>SerializationContext</code>,
  <code>DeserializationContext</code> kept its name but moved packages.
  Method signatures on these classes also changed.

why_changed: >
  The "Json" prefix was misleading — Jackson handles YAML, XML, CBOR, and
  other formats. The new names reflect that serialisers work with values,
  not specifically JSON. The rename also aligned the class hierarchy with
  the new streaming API.

diffs:
  - comment: "// Custom serializer class"
    removed: |
      import com.fasterxml.jackson.databind.JsonSerializer;
      import com.fasterxml.jackson.databind.SerializerProvider;

      public class DateSerializer extends JsonSerializer<LocalDate> {
          @Override
          public void serialize(LocalDate value, JsonGenerator gen,
                  SerializerProvider provider) throws IOException {
    added: |
      import tools.jackson.databind.ser.ValueSerializer;
      import tools.jackson.databind.SerializationContext;

      public class DateSerializer extends ValueSerializer<LocalDate> {
          @Override
          public void serialize(LocalDate value, JsonGenerator gen,
                  SerializationContext ctxt) throws IOException {
  - comment: "// Custom deserializer class"
    removed: |
      import com.fasterxml.jackson.databind.JsonDeserializer;

      public class DateDeserializer extends JsonDeserializer<LocalDate> {
    added: |
      import tools.jackson.databind.deser.ValueDeserializer;

      public class DateDeserializer extends ValueDeserializer<LocalDate> {
  - comment: "// Exception handling"
    removed: "import com.fasterxml.jackson.databind.JsonMappingException;"
    added: "import tools.jackson.databind.DatabindException;"

fixes:
  - label: "OpenRewrite (recommended)."
    text: >
      Run the <a href="https://docs.openrewrite.org/recipes/java/jackson/upgradejackson_2_3_typechanges">Jackson 3
      type changes recipe</a>. It handles class renames, method signature
      updates, and import changes in one pass.
  - label: "Manual migration."
    text: >
      Replace class names and imports file by file. The full mapping is in
      the <a href="https://github.com/FasterXML/jackson/blob/main/jackson3/MIGRATING_TO_JACKSON_3.md">Jackson 3
      migration guide</a>. Don't forget to update method parameter types
      in overridden methods.

scope_check: >
  Search for <code>extends JsonSerializer</code>,
  <code>extends JsonDeserializer</code>, <code>SerializerProvider</code>,
  and <code>JsonMappingException</code>. Every custom serialiser,
  deserialiser, and exception handler needs updating.

watch_out:
  - >
    The method signatures changed too, not just the class names.
    <code>serialize()</code> now takes a <code>SerializationContext</code>
    instead of <code>SerializerProvider</code>. If you only rename the
    class but keep the old parameter type, you'll get an abstract method
    error instead of a clean override.
  - >
    Annotations like <code>@JsonSerialize(using = ...)</code> still work
    but must reference the new class names. A custom serialiser registered
    via annotation will fail at runtime if it extends the wrong base class.

footer_links:
