id: jackson-date-format
tier: 3
tier_label: "Wrong Results"
title: "Jackson Date Serialisation Flip"
series: "spring-boot 3.5 → 4.0"
effort: M
openrewrite: false
verify: >
  JSON responses show dates in expected format (check API output)

further_info: >
  Driven by Jackson 3.0 (upstream of Spring Boot 4.0). The default for
  WRITE_DATES_AS_TIMESTAMPS flipped from true to false. Announced in the
  Jackson 3.0 release notes. Affects all spring-boot-starter-json consumers
  with date/time fields in DTOs. See also: jackson-dates-timestamps,
  jackson-property-inclusion.

oneliner: >
  Jackson 3.0 defaults to ISO-8601 date strings instead of numeric
  timestamps. Every API response containing a date silently changes shape.

error_output: |
  // API response — before (Spring Boot 3.5)
  {"created": 1714089600000}

  // API response — after (Spring Boot 4.0)
  {"created": "2025-04-26T00:00:00Z"}

  // Front-end JavaScript blows up
  TypeError: date.getTime is not a function
  // or: contract test fails
  Expected: <1714089600000> (Long)
    Actual: <"2025-04-26T00:00:00Z"> (String)

what_changed: >
  Jackson 3.0 changed the default value of
  <code>SerializationFeature.WRITE_DATES_AS_TIMESTAMPS</code> from
  <code>true</code> to <code>false</code>. Dates, times, and durations now
  serialise as ISO-8601 strings by default instead of numeric epoch
  milliseconds.

why_changed: >
  ISO-8601 strings are human-readable, timezone-aware, and the de facto
  standard in JSON APIs. The old numeric default caused constant confusion
  about whether the value was seconds or milliseconds, and lost timezone
  information entirely.

diffs:
  - comment: "// application.properties — restore old behaviour"
    removed: "# (no explicit setting needed in Boot 3.5)"
    added: "spring.jackson.serialization.write-dates-as-timestamps=true"
  - comment: "// or adopt ISO-8601 and fix the client"
    removed: "const ts = new Date(response.created);  // was a number"
    added: "const ts = new Date(response.created);  // now parses ISO string"
  - comment: "// ObjectMapper explicit configuration"
    removed: |
      // Jackson 2 default: timestamps enabled
      ObjectMapper mapper = new ObjectMapper();
      mapper.registerModule(new JavaTimeModule());
    added: |
      // Jackson 3 default: ISO strings
      ObjectMapper mapper = new ObjectMapper();
      mapper.registerModule(new JavaTimeModule());
      // only if you need the old numeric format:
      mapper.enable(SerializationFeature.WRITE_DATES_AS_TIMESTAMPS);

fixes:
  - label: "Opt in to the new ISO-8601 default (recommended)."
    text: >
      Update your API clients and contract tests to expect ISO-8601 strings.
      This is the better long-term format. Coordinate the change with
      front-end teams so they parse the string, not a number.
  - label: "Restore numeric timestamps."
    text: >
      Add <code>spring.jackson.serialization.write-dates-as-timestamps=true</code>
      to <code>application.properties</code>. This gives you the old behaviour
      while you plan the migration.

scope_check: >
  Search for any DTO field of type <code>java.util.Date</code>,
  <code>Instant</code>, <code>LocalDate</code>, <code>LocalDateTime</code>,
  <code>ZonedDateTime</code>, or <code>Duration</code>. Every one of those
  fields will serialise differently after the upgrade. Check API consumers,
  contract tests, and front-end parsing code.

watch_out:
  - >
    This change is invisible at compile time and at startup. The app runs
    perfectly — until a client tries to parse the date field as a number.
    If you have no contract tests, you won't catch this until production.
  - >
    The <code>@JsonFormat</code> annotation on individual fields still
    overrides the global default. If you've already annotated your dates,
    those fields are unaffected. It's the unannotated ones that silently flip.

