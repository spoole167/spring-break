id: spring-session-property-renames
tier: 3
tier_label: "Wrong Results"
title: "Spring Session Property Prefixes Renamed"
series: "spring-boot 3.5 → 4.0"
effort: S
openrewrite: false
verify: >
  Session store connects correctly with the renamed property prefixes —
  confirm sessions persist to Redis or MongoDB with the new configuration

further_info: >
  Spring Boot 4.0 renamed the configuration properties for Spring Session's
  Redis and MongoDB backends. The Redis session properties moved from
  <code>spring.session.redis.*</code> to <code>spring.session.data.redis.*</code>.
  The MongoDB session properties moved from <code>spring.session.mongodb.*</code>
  to <code>spring.session.data.mongodb.*</code>. Properties still using the
  old prefixes are silently ignored — sessions are stored with defaults
  (wrong namespace, wrong collection, wrong TTL) or the auto-configuration
  falls back to the first available store type.

oneliner: >
  <code>spring.session.redis.*</code> and <code>spring.session.mongodb.*</code>
  are silently ignored in Boot 4.0. The new prefixes are
  <code>spring.session.data.redis.*</code> and
  <code>spring.session.data.mongodb.*</code>.

error_output: |
  # application.properties (Boot 3.5 style — silently ignored on 4.0):
  spring.session.redis.namespace=myapp
  spring.session.redis.flush-mode=on-save
  spring.session.mongodb.collection-name=sessions

  # Boot 4.0: app starts, sessions stored under default namespace.
  # No error. Session isolation between apps sharing the same Redis
  # instance is broken.

what_changed: >
  Spring Session's Redis backend properties moved from
  <code>spring.session.redis.*</code> to <code>spring.session.data.redis.*</code>.
  MongoDB backend properties moved from <code>spring.session.mongodb.*</code>
  to <code>spring.session.data.mongodb.*</code>. This mirrors the MongoDB
  connection property rename pattern (<code>spring.data.mongodb</code> →
  <code>spring.mongodb</code>) and aligns with the session backends being
  tied to Spring Data modules.

why_changed: >
  Spring Boot 4.0 restructured session auto-configuration to more clearly
  tie session store configuration to the corresponding Spring Data module
  configuration namespace. The <code>data</code> infix makes the relationship
  explicit: Redis session configuration lives under the Spring Data Redis
  namespace.

diffs:
  - comment: "// Redis session properties"
    removed: |
      spring.session.redis.namespace=myapp:session
      spring.session.redis.flush-mode=on-save
      spring.session.redis.save-mode=on-set-attribute
      spring.session.redis.cleanup-cron=0 * * * * *
    added: |
      spring.session.data.redis.namespace=myapp:session
      spring.session.data.redis.flush-mode=on-save
      spring.session.data.redis.save-mode=on-set-attribute
      spring.session.data.redis.cleanup-cron=0 * * * * *
  - comment: "// MongoDB session properties"
    removed: |
      spring.session.mongodb.collection-name=sessions
    added: |
      spring.session.data.mongodb.collection-name=sessions

fixes:
  - label: "Rename spring.session.redis.* to spring.session.data.redis.*"
    text: >
      Do a project-wide search-and-replace:
      <code>spring.session.redis.</code> → <code>spring.session.data.redis.</code>
      and <code>spring.session.mongodb.</code> → <code>spring.session.data.mongodb.</code>.
      Check all property files, YAML files, and profile variants.

scope_check: >
  Grep for <code>spring.session.redis</code> and
  <code>spring.session.mongodb</code> across all property and YAML files.

watch_out:
  - >
    The session store type property (<code>spring.session.store-type</code>)
    is unchanged. Only the store-specific configuration sub-keys are affected.
  - >
    Silent failure makes this hard to catch in testing. A wrong namespace
    in Redis means sessions are stored but never found — users appear logged
    out immediately after login. Confirm the fix by verifying session keys
    exist in Redis under the expected namespace.

footer_links:
  - text: "Spring Boot 4.0 Migration Guide"
    url: "https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Migration-Guide"
