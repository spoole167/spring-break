id: websecurity-adapter-removed
tier: 1
tier_label: "Won't Build"
title: "WebSecurityConfigurerAdapter Removed"
series: "spring-boot 3.5 → 4.0"
effort: M
openrewrite: true
verify: >
  mvn compile — no WebSecurityConfigurerAdapter references

further_info: >
  WebSecurityConfigurerAdapter was deprecated in Spring Security 5.7 and
  removed in 7.0. The bean-based SecurityFilterChain approach was introduced
  in Security 5.4 as the recommended replacement. Affects all
  spring-boot-starter-security consumers. See also: security-dsl-rewrite,
  auth-default-deny.

oneliner: >
  WebSecurityConfigurerAdapter was deleted from Spring Security.
  Any config class extending it won't compile.

error_output: |
  $ mvn compile
  [ERROR] /src/main/java/com/example/SecurityConfig.java:[6,55]
    error: cannot find symbol
      symbol: class WebSecurityConfigurerAdapter
  [ERROR] /src/main/java/com/example/SecurityConfig.java:[10,5]
    error: method does not override or implement a method from a supertype
      @Override
      protected void configure(HttpSecurity http)

what_changed: >
  <code>WebSecurityConfigurerAdapter</code> was deprecated in Spring
  Security 5.7 and removed in 7.0. Configuration is now done by declaring
  <code>@Bean</code> methods that return <code>SecurityFilterChain</code>,
  <code>UserDetailsService</code>, etc. The <code>configure(HttpSecurity)</code>
  and <code>configure(AuthenticationManagerBuilder)</code> override pattern
  is gone.

why_changed: >
  The adapter pattern forced all security config into a single class and
  made it hard to compose multiple filter chains. Bean-based configuration
  is more modular and works naturally with Spring's dependency injection.

diffs:
  - comment: "// Security configuration class"
    removed: |
      @Configuration
      @EnableWebSecurity
      public class SecurityConfig extends WebSecurityConfigurerAdapter {

          @Override
          protected void configure(HttpSecurity http) throws Exception {
              http
                  .authorizeHttpRequests(auth -> auth
                      .requestMatchers("/public/**").permitAll()
                      .anyRequest().authenticated()
                  );
          }

          @Override
          protected void configure(AuthenticationManagerBuilder auth) throws Exception {
              auth.inMemoryAuthentication()
                  .withUser("user").password("{noop}pass").roles("USER");
          }
      }
    added: |
      @Configuration
      @EnableWebSecurity
      public class SecurityConfig {

          @Bean
          public SecurityFilterChain filterChain(HttpSecurity http) throws Exception {
              http
                  .authorizeHttpRequests(auth -> auth
                      .requestMatchers("/public/**").permitAll()
                      .anyRequest().authenticated()
                  );
              return http.build();
          }

          @Bean
          public UserDetailsService userDetailsService() {
              var user = User.withUsername("user")
                  .password("{noop}pass").roles("USER").build();
              return new InMemoryUserDetailsManager(user);
          }
      }

fixes:
  - label: "Convert to @Bean configuration."
    text: >
      Remove the <code>extends WebSecurityConfigurerAdapter</code>. Turn
      <code>configure(HttpSecurity)</code> into a <code>@Bean</code>
      method returning <code>SecurityFilterChain</code>. Call
      <code>http.build()</code> at the end. Move authentication config
      to separate <code>@Bean</code> methods.
  - label: "Use OpenRewrite."
    text: >
      The <code>org.openrewrite.java.spring.security6.RemoveWebSecurityConfigurerAdapter</code>
      recipe automates the conversion.

scope_check: >
  Search for <code>extends WebSecurityConfigurerAdapter</code> and
  <code>import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter</code>.
  Every hit is a class that needs rewriting.

watch_out:
  - >
    Don't forget <code>http.build()</code>. The bean method must return a
    <code>SecurityFilterChain</code>, not <code>void</code>. Missing
    the return statement is a common mistake that gives a confusing
    null-pointer error at startup.
  - >
    If you had multiple <code>configure()</code> overrides in the same
    adapter, split them into separate beans. Authentication configuration
    should become a <code>UserDetailsService</code> or
    <code>AuthenticationManager</code> bean, not part of the filter chain.

footer_links:
  - text: "spring-break module: security-removed-apis"
    url: "https://github.com/spoole167/spring-break/tree/main/security-removed-apis"
  - text: "Spring Security 7 migration guide"
    url: "https://docs.spring.io/spring-security/reference/6.5/migration-7/configuration.html"
