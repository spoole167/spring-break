id: jackson-locale-format
tier: 3
tier_label: "Wrong Results"
title: "Jackson Locale Format Change (BCP 47)"
series: "spring-boot 3.5 → 4.0"
effort: S
openrewrite: false
verify: >
  Locale-sensitive fields render correctly in all target locales

further_info: >
  Driven by Jackson 3.0 (upstream of Spring Boot 4.0). Locale serialisation
  switched from Java's toString() format (zh_CN) to IETF BCP 47 / RFC 5646
  language tags (zh-CN). Affects any DTO with java.util.Locale fields
  serialised via spring-boot-starter-json. See also: jackson-date-format,
  jackson-group-id.

oneliner: >
  Jackson 3.0 serialises <code>Locale</code> using IETF BCP 47 format
  (zh-CN) instead of Java's underscore format (zh_CN). Locale-matching
  logic silently breaks.

error_output: |
  // API response — before (Spring Boot 3.5)
  {"userLocale": "zh_CN"}

  // API response — after (Spring Boot 4.0)
  {"userLocale": "zh-CN"}

  // Downstream lookup fails silently
  Map<String, String> labels = i18nMap.get(user.getLocale());
  // returns null — map keys use "zh_CN", response now sends "zh-CN"

  // Test failure
  org.opentest4j.AssertionFailedError:
  Expected: "zh_CN"
    Actual: "zh-CN"

what_changed: >
  Jackson 3.0 switched <code>Locale</code> serialisation from Java's
  <code>toString()</code> format (<code>zh_CN</code>) to the IETF BCP 47
  language tag format (<code>zh-CN</code>). Underscores become hyphens and
  the structure follows RFC 5646.

why_changed: >
  BCP 47 is the web standard used by HTTP <code>Accept-Language</code>
  headers, HTML <code>lang</code> attributes, and JavaScript's
  <code>Intl</code> API. Aligning Jackson's output with the rest of the web
  ecosystem removes a constant source of mismatch bugs.

diffs:
  - comment: "// Custom serialiser to restore old format"
    removed: |
      // No custom serialiser needed in Boot 3.5
    added: |
      @JsonSerialize(using = JavaLocaleSerializer.class)
      private Locale userLocale;
  - comment: "// Or update all consumers to use BCP 47"
    removed: "String localeKey = user.getLocale(); // \"zh_CN\""
    added: "String localeKey = Locale.forLanguageTag(user.getLocale()).toString(); // normalise"
  - comment: "// Fix i18n lookup maps"
    removed: "i18nMap.put(\"zh_CN\", chineseLabels);"
    added: "i18nMap.put(\"zh-CN\", chineseLabels);"

fixes:
  - label: "Adopt BCP 47 throughout (recommended)."
    text: >
      Update your i18n maps, database locale columns, and downstream consumers
      to use hyphenated BCP 47 tags. This aligns with HTTP headers and browser
      APIs. Run a data migration for persisted locale strings.
  - label: "Write a custom Locale serialiser."
    text: >
      Register a custom Jackson serialiser that calls
      <code>locale.toString()</code> instead of
      <code>locale.toLanguageTag()</code>. This preserves the old underscore
      format while you plan the broader migration.

scope_check: >
  Search for any DTO or entity field of type <code>java.util.Locale</code>
  that gets serialised to JSON. Also check database columns, message queues,
  and i18n resource bundle keys that use the underscore format. Every one of
  those is a potential mismatch.

watch_out:
  - >
    If you store locale strings in a database and compare them with
    equality checks, the format flip will cause silent mismatches.
    A <code>SELECT WHERE locale = 'zh_CN'</code> query won't match
    the new <code>zh-CN</code> value sent by the API.
  - >
    Some locales have three components (e.g. <code>zh_Hant_TW</code>
    becomes <code>zh-Hant-TW</code>). The conversion isn't just
    replacing underscores with hyphens — BCP 47 has subtag rules.
    Use <code>Locale.forLanguageTag()</code> for correct round-tripping.

footer_links:
  - text: "spring-break module: jackson-locale-format"
    url: "https://github.com/spoole167/spring-break/tree/main/jackson-locale-format"
  - text: "Jackson 3 migration guide"
