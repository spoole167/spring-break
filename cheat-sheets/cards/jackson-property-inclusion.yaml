id: jackson-property-inclusion
tier: 3
tier_label: "Wrong Results"
title: "spring.jackson.default-property-inclusion Silently Ignored"
series: "spring-boot 3.5 → 4.0"
effort: M
openrewrite: false
verify: >
  JSON output excludes null fields where expected (compare before/after)

further_info: >
  Driven by the combination of Jackson 3.0 and Spring Boot 4.0's
  auto-configuration changes. The spring.jackson.default-property-inclusion
  property binding was removed because Jackson 3.0 restructured its
  inclusion configuration API. Affects all spring-boot-starter-json
  consumers. See also: jackson-dates-timestamps, jackson-date-format.

oneliner: >
  The <code>spring.jackson.default-property-inclusion</code> property no
  longer configures Jackson 3's ObjectMapper. Null fields reappear in
  your API responses without warning.

error_output: |
  # application.properties (still present, no startup warning)
  spring.jackson.default-property-inclusion=non_null

  // API response — before (Spring Boot 3.5)
  {"name": "Alice", "age": 30}

  // API response — after (Spring Boot 4.0)
  {"name": "Alice", "age": 30, "middleName": null, "nickname": null}

  // Contract test failure
  org.opentest4j.AssertionFailedError:
  Expected JSON keys: [name, age]
    Actual JSON keys: [name, age, middleName, nickname]

what_changed: >
  Spring Boot 4.0's auto-configuration for Jackson 3 no longer reads the
  <code>spring.jackson.default-property-inclusion</code> property. The
  property sits in your config file doing nothing — no deprecation warning,
  no startup error. The ObjectMapper reverts to Jackson's default inclusion
  policy: <code>ALWAYS</code> (include everything, including nulls).

why_changed: >
  Jackson 3 restructured how serialisation inclusion is configured, moving
  from a single global enum to a more granular per-type system. The old
  Spring Boot property didn't map cleanly to the new API, so the
  auto-configuration binding was removed pending a redesign.

diffs:
  - comment: "// application.properties — old (silently ignored)"
    removed: "spring.jackson.default-property-inclusion=non_null"
    added: "# Removed — configure via ObjectMapper bean instead"
  - comment: "// ObjectMapper customiser bean"
    removed: "# (relied on spring.jackson.default-property-inclusion)"
    added: |
      @Bean
      public Jackson2ObjectMapperBuilderCustomizer nonNullInclusion() {
          return builder -> builder
              .serializationInclusion(JsonInclude.Include.NON_NULL);
      }
  - comment: "// Or per-class annotation"
    removed: "public class UserDto {"
    added: |
      @JsonInclude(JsonInclude.Include.NON_NULL)
      public class UserDto {

fixes:
  - label: "Register an ObjectMapper customiser bean (recommended)."
    text: >
      Create a <code>Jackson2ObjectMapperBuilderCustomizer</code> bean that
      calls <code>serializationInclusion(NON_NULL)</code>. This replaces the
      property-based configuration and works with Jackson 3.
  - label: "Annotate DTOs individually."
    text: >
      Add <code>@JsonInclude(JsonInclude.Include.NON_NULL)</code> to each
      DTO class. More verbose, but gives you per-class control and makes the
      contract explicit in the code.

scope_check: >
  Check whether your <code>application.properties</code> or
  <code>application.yml</code> sets
  <code>spring.jackson.default-property-inclusion</code>. If it does,
  that setting is now dead. Every API response from your app may now include
  null fields that were previously omitted.

watch_out:
  - >
    There is no deprecation warning at startup. The property is silently
    ignored. The only signal is larger JSON payloads with unexpected null
    fields — easy to miss without contract tests.
  - >
    If your front-end checks for key presence (e.g.
    <code>if ("middleName" in user)</code>) instead of checking for null
    values, the extra null fields will change branching logic silently.

