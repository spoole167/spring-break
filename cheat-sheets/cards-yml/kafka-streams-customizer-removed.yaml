id: kafka-streams-customizer-removed
tier: 1
tier_label: "Won't Build"
title: "Kafka StreamsBuilderFactoryBeanCustomizer Removed"
series: "spring-boot 3.5 → 4.0"
effort: S
openrewrite: false
verify: >
  mvn compile: no cannot find symbol for StreamsBuilderFactoryBeanCustomizer

further_info: >
  The removal is part of shrinking Boot's Kafka auto-configuration surface;
  the upstream Spring Kafka interface is the long-term home.

oneliner: >
  Spring Boot's StreamsBuilderFactoryBeanCustomizer is gone. Replace it with
  Spring Kafka's StreamsBuilderFactoryBeanConfigurer.

error_output: |
  $ mvn compile
  [ERROR] /src/main/java/com/example/KafkaCustomizerUsage.java:[3,60]
    error: package org.springframework.boot.autoconfigure.kafka does not contain
    StreamsBuilderFactoryBeanCustomizer

what_changed: >
  <code>org.springframework.boot.autoconfigure.kafka.StreamsBuilderFactoryBeanCustomizer</code>
  has been removed. The replacement is
  <code>org.springframework.kafka.config.StreamsBuilderFactoryBeanConfigurer</code>
  from Spring Kafka itself.

why_changed: >
  Spring Boot's interface was a thin duplicate of one Spring Kafka already
  provides. Removing it cuts an unnecessary indirection.

diffs:
  - comment: "// Import"
    removed: "import org.springframework.boot.autoconfigure.kafka.StreamsBuilderFactoryBeanCustomizer;"
    added: "import org.springframework.kafka.config.StreamsBuilderFactoryBeanConfigurer;"
  - comment: "// Bean method signature"
    removed: "@Bean\npublic StreamsBuilderFactoryBeanCustomizer customizer() { ... }"
    added: "@Bean\npublic StreamsBuilderFactoryBeanConfigurer configurer() { ... }"
  - comment: "// implements clause"
    removed: "public class MyCustomizer implements StreamsBuilderFactoryBeanCustomizer {"
    added: "public class MyCustomizer implements StreamsBuilderFactoryBeanConfigurer {"

fixes:
  - label: "Switch to StreamsBuilderFactoryBeanConfigurer."
    text: >
      Replace the import and the implements / return type declaration.
      The interface method signature is compatible: the method you override
      is <code>configure(StreamsBuilderFactoryBean)</code> in both cases.

scope_check: >
  Search for <code>StreamsBuilderFactoryBeanCustomizer</code> in all Java/Kotlin
  sources. Only Kafka Streams applications are affected.

watch_out:
  - >
    The method name on <code>StreamsBuilderFactoryBeanConfigurer</code> is
    <code>configure</code>, same as the old <code>customize</code>. Verify the
    exact method name in the Spring Kafka version you're using: it differs
    between minor versions.

footer_links:
  - text: "spring-break module: kafka-streams-customizer-removed"
    url: "https://github.com/spoole167/spring-break/tree/main/kafka-streams-customizer-removed"
